// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ Login Screen ГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function LoginScreen({ onLogin }) {
    const [selected, setSelected] = useState(null);
    const [pin, setPin] = useState(['', '', '', '']);
    const [error, setError] = useState('');
    const refs = [React.createRef(), React.createRef(), React.createRef(), React.createRef()];

    const handlePinChange = (idx, val) => {
        if (val.length > 1) val = val.slice(-1);
        if (val && !/^\d$/.test(val)) return;
        const newPin = [...pin];
        newPin[idx] = val;
        setPin(newPin);
        setError('');
        if (val && idx < 3) refs[idx + 1].current?.focus();
        if (newPin.every(d => d !== '')) {
            const entered = newPin.join('');
            const agent = AGENTS.find(a => a.name === selected);
            if (agent && agent.pin === entered) {
                onLogin(agent);
            } else {
                setError('Wrong PIN');
                setTimeout(() => { setPin(['', '', '', '']); refs[0].current?.focus(); }, 500);
            }
        }
    };

    const handleKeyDown = (idx, e) => {
        if (e.key === 'Backspace' && !pin[idx] && idx > 0) refs[idx - 1].current?.focus();
    };

    return (
        <div className="login-screen">
            <div className="login-box">
                <div className="login-logo">TCT</div>
                <div className="login-sub">Team Command Center</div>
                {!selected ? (
                    <>
                        <div style={{fontSize:'14px',color:'#94a3b8',marginBottom:'16px'}}>Who's logging in?</div>
                        <div className="agent-select">
                            {AGENTS.map(a => (
                                <div key={a.name} className="agent-option" onClick={() => { setSelected(a.name); setTimeout(() => refs[0].current?.focus(), 100); }}>
                                    <div style={{fontSize:'24px',marginBottom:'4px'}}>{a.name[0]}</div>
                                    <div>{a.name}</div>
                                </div>
                            ))}
                        </div>
                    </>
                ) : (
                    <>
                        <div style={{fontSize:'14px',color:'#94a3b8',marginBottom:'6px'}}>Enter PIN for</div>
                        <div style={{fontSize:'20px',fontWeight:'bold',marginBottom:'20px',color:'#6366f1'}}>{selected}</div>
                        <div className="pin-input">
                            {pin.map((d, i) => (
                                <input key={i} ref={refs[i]} className="pin-digit" type="password" maxLength="1" value={d}
                                    onChange={e => handlePinChange(i, e.target.value)} onKeyDown={e => handleKeyDown(i, e)} />
                            ))}
                        </div>
                        {error && <div style={{color:'#ef4444',fontSize:'13px',marginBottom:'12px'}}>{error}</div>}
                        <div style={{color:'#64748b',fontSize:'12px',cursor:'pointer'}} onClick={() => { setSelected(null); setPin(['','','','']); setError(''); }}>ГўВ†Вђ Pick a different person</div>
                    </>
                )}
            </div>
        </div>
    );
}

// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ Overview Page ГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function OverviewPage({ deals, goals, kpis, currentUser }) {
    const closedDeals = deals.filter(d => d.stage === 'Closed');
    const activePipeline = deals.filter(d => d.stage !== 'Closed' && d.stage !== 'Lost');
    const totalClosed = closedDeals.reduce((s, d) => s + (d.sale_price || 0), 0);
    const totalGCI = closedDeals.reduce((s, d) => s + (d.team_gross || 0), 0);
    const teamGoal = goals.reduce((s, g) => s + (g.annual_goal || 0), 0);
    const pctToGoal = teamGoal > 0 ? ((totalClosed / teamGoal) * 100).toFixed(1) : 0;

    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const now = new Date();
    const currentMonth = now.getMonth();

    const monthlyClosings = months.map((m, i) => {
        const mc = closedDeals.filter(d => {
            const cd = new Date(d.close_date);
            return cd.getMonth() === i && cd.getFullYear() === now.getFullYear();
        });
        return { month: m, count: mc.length, volume: mc.reduce((s, d) => s + (d.sale_price || 0), 0) };
    });

    return (
        <>
            <div className="stat-grid">
                <div className="stat-card">
                    <div className="stat-label">Closed Volume (YTD)</div>
                    <div className="stat-value">${(totalClosed/1000000).toFixed(2)}M</div>
                    <div className="stat-subtext">{pctToGoal}% to team goal</div>
                    <div className="progress-bar"><div className="progress-fill" style={{width: Math.min(pctToGoal, 100) + '%'}}></div></div>
                </div>
                <div className="stat-card">
                    <div className="stat-label">Team GCI</div>
                    <div className="stat-value">${(totalGCI/1000).toFixed(0)}K</div>
                    <div className="stat-subtext">{closedDeals.length} deals closed</div>
                </div>
                <div className="stat-card">
                    <div className="stat-label">Active Pipeline</div>
                    <div className="stat-value">${(activePipeline.reduce((s,d) => s + (d.sale_price||0), 0)/1000000).toFixed(2)}M</div>
                    <div className="stat-subtext">{activePipeline.length} deals in pipeline</div>
                </div>
                <div className="stat-card">
                    <div className="stat-label">Units Closed</div>
                    <div className="stat-value">{closedDeals.length}</div>
                    <div className="stat-subtext">Team goal: {goals.length} agents active</div>
                </div>
            </div>

            <h3 className="section-title">Agent Performance (YTD)</h3>
            {AGENTS.filter(a => a.role !== 'Admin').map(agent => {
                const goal = goals.find(g => g.agent === agent.name);
                const annualGoal = goal?.annual_goal || 0;
                const agentDeals = closedDeals.filter(d => d.agent === agent.name);
                const agentVol = agentDeals.reduce((s, d) => s + (d.sale_price || 0), 0);
                const pct = annualGoal > 0 ? ((agentVol / annualGoal) * 100).toFixed(0) : 0;
                const gap = annualGoal - agentVol;
                const agentKpis = kpis.filter(k => k.agent === agent.name && k.year === now.getFullYear());
                const totalCalls = agentKpis.reduce((s, k) => s + (k.calls || 0), 0);

                return (
                    <div key={agent.name} className="agent-card">
                        <div className="agent-header">
                            <div>
                                <h4 className="agent-name" style={{color: agent.color}}>{agent.name}</h4>
                                <div className="agent-goal">Goal: ${(annualGoal/1000000).toFixed(1)}M</div>
                            </div>
                            <div style={{textAlign:'right'}}>
                                <div style={{fontSize:'14px',fontWeight:'bold'}}>{pct}% to goal</div>
                                <div style={{fontSize:'12px',color:'#64748b'}}>Gap: ${(gap/1000000).toFixed(1)}M</div>
                            </div>
                        </div>
                        <div className="progress-bar" style={{marginBottom:'12px'}}><div className="progress-fill" style={{width: Math.min(pct, 100) + '%', background: agent.color}}></div></div>
                        <div className="agent-stats">
                            <div className="agent-stat"><div className="agent-stat-value">{agentDeals.length}</div><div className="agent-stat-label">Units</div></div>
                            <div className="agent-stat"><div className="agent-stat-value">${(agentVol/1000).toFixed(0)}K</div><div className="agent-stat-label">Volume</div></div>
                            <div className="agent-stat"><div className="agent-stat-value">{totalCalls}</div><div className="agent-stat-label">Calls</div></div>
                            <div className="agent-stat"><div className="agent-stat-value">${(gap/1000000).toFixed(1)}M</div><div className="agent-stat-label">Gap</div></div>
                        </div>
                    </div>
                );
            })}

            <h3 className="section-title" style={{marginTop:'24px'}}>Monthly Closings</h3>
            <div className="card">
                <div style={{display:'flex',gap:'8px',alignItems:'end',height:'120px'}}>
                    {monthlyClosings.map((m, i) => {
                        const maxVol = Math.max(...monthlyClosings.map(x => x.volume), 1);
                        const h = (m.volume / maxVol) * 100;
                        return (
                            <div key={m.month} style={{flex:1,textAlign:'center'}}>
                                <div style={{fontSize:'11px',color:'#e2e8f0',marginBottom:'4px'}}>{m.count > 0 ? m.count : ''}</div>
                                <div style={{height: Math.max(h, 4) + 'px', background: i === currentMonth ? '#6366f1' : 'rgba(99,102,241,0.3)', borderRadius:'3px 3px 0 0', transition:'height 0.3s'}}></div>
                                <div style={{fontSize:'10px',color:'#64748b',marginTop:'4px'}}>{m.month}</div>
                            </div>
                        );
                    })}
                </div>
            </div>
        </>
    );
}

// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ Deals Page ГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function DealsPage({ deals, setDeals, currentUser }) {

    const openEdit = (d) => { setForm({...d}); setEditDeal(d); setShowModal(true); };

    const saveDeal = async () => {
        const data = {
            address: form.address || '', client: form.client || '', agent: form.agent || '', side: form.side || 'Buyer',
            stage: form.stage || 'New Lead', sale_price: parseFloat(form.sale_price) || 0, gross_commission: parseFloat(form.gross_commission) || 0,
            team_gross: parseFloat(form.team_gross) || 0, split: form.split || '', source: form.source || '', lender: form.lender || '',
            binding_date: form.binding_date || null, close_date: form.close_date || null, due_diligence: form.due_diligence || null,
            financing_contingency: form.financing_contingency || null, updated_at: new Date().toISOString()
        };
        if (editDeal) {
            const { error } = await sb.from('deals').update(data).eq('id', editDeal.id);
            if (!error) { setDeals(prev => prev.map(d => d.id === editDeal.id ? {...d, ...data} : d)); }
        } else {
            const { data: nd, error } = await sb.from('deals').insert(data).select();
            if (!error && nd) setDeals(prev => [...prev, nd[0]]);
        }
        setShowModal(false);
    };

    const stageBadge = (stage) => {
        const map = { 'Closed': 'badge-green', 'Under Contract': 'badge-blue', 'Pending': 'badge-yellow', 'Lost': 'badge-red', 'New Lead': 'badge-purple', 'Showing': 'badge-blue' };
        return map[stage] || 'badge-gray';
    };

    const isAdmin = currentUser.role === 'Admin' || currentUser.role === 'Team Lead';

    return (
        <>
            <div style={{display:'flex',gap:'8px',marginBottom:'20px',flexWrap:'wrap',alignItems:'center'}}>
                {['Active','All','Under Contract','Pending','Closed','Lost'].map(f => (
                    <div key={f} className={`tab-item ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>{f}</div>
                ))}
                <div style={{flex:1}}></div>
                {isAdmin && <button className="btn btn-primary" onClick={openNew}>+ New Deal</button>}
            </div>
            <div className="table-container">
                <table>
                    <thead><tr>
                        <th>Address</th><th>Client</th><th>Agent</th><th>Side</th><th>Stage</th><th>Price</th><th>Close Date</th>
                        {isAdmin && <th>Actions</th>}
                    </tr></thead>
                    <tbody>
                        {filtered.map(d => (
                            <tr key={d.id}>
                                <td style={{fontWeight:500}}>{d.address}</td>
                                <td>{d.client}</td>
                                <td>{d.agent}</td>
                                <td>{d.side}</td>
                                <td><span className={`badge ${stageBadge(d.stage)}`}>{d.stage}</span></td>
                                <td>${(d.sale_price || 0).toLocaleString()}</td>
                                <td>{d.close_date || 'ГўВЂВ”'}</td>
                                {isAdmin && <td><button className="btn btn-sm btn-outline" onClick={() => openEdit(d)}>Edit</button></td>}
                            </tr>
                        ))}
                        {filtered.length === 0 && <tr><td colSpan={isAdmin ? 8 : 7} className="empty-state">No deals found</td></tr>}
                    </tbody>
                </table>
            </div>

            {showModal && (
                <div className="modal-overlay" onClick={() => setShowModal(false)}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <div className="modal-title">{editDeal ? 'Edit Deal' : 'New Deal'}</div>
                            <button className="modal-close" onClick={() => setShowModal(false)}>ГѓВ—</button>
                        </div>
                        <div className="form-row">
                            <div className="form-group"><label className="form-label">Address</label><input className="form-input" value={form.address||''} onChange={e => setForm({...form, address: e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">Client Name</label><input className="form-input" value={form.client||''} onChange={e => setForm({...form, client: e.target.value})} /></div>
                        </div>
                        <div className="form-row-3">
                            <div className="form-group"><label className="form-label">Agent</label>
                                <select className="form-select" value={form.agent||''} onChange={e => setForm({...form, agent: e.target.value})}>
                                    {AGENTS.filter(a=>a.role!=='Admin').map(a => <option key={a.name} value={a.name}>{a.name}</option>)}
                                </select></div>
                            <div className="form-group"><label className="form-label">Side</label>
                                <select className="form-select" value={form.side||'Buyer'} onChange={e => setForm({...form, side: e.target.value})}>
                                    {DEAL_SIDES.map(s => <option key={s} value={s}>{s}</option>)}
                                </select></div>
                            <div className="form-group"><label className="form-label">Stage</label>
                                <select className="form-select" value={form.stage||'New Lead'} onChange={e => setForm({...form, stage: e.target.value})}>
                                    {STAGES.map(s => <option key={s} value={s}>{s}</option>)}
                                </select></div>
                        </div>
                        <div className="form-row-3">
                            <div className="form-group"><label className="form-label">Sale Price</label><input className="form-input" type="number" value={form.sale_price||''} onChange={e => setForm({...form, sale_price: e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">Gross Commission</label><input className="form-input" type="number" value={form.gross_commission||''} onChange={e => setForm({...form, gross_commission: e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">Team Gross</label><input className="form-input" type="number" value={form.team_gross||''} onChange={e => setForm({...form, team_gross: e.target.value})} /></div>
                        </div>
                        <div className="form-row">
                            <div className="form-group"><label className="form-label">Source</label><input className="form-input" value={form.source||''} onChange={e => setForm({...form, source: e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">Lender</label><input className="form-input" value={form.lender||''} onChange={e => setForm({...form, lender: e.target.value})} /></div>
                        </div>
                        <div style={{marginTop:'8px',marginBottom:'12px',fontWeight:600,color:'#94a3b8',fontSize:'12px',textTransform:'uppercase',letterSpacing:'0.5px'}}>Contract Dates</div>
                        <div className="form-row">
                            <div className="form-group"><label className="form-label">Binding Date</label><input className="form-input" type="date" value={form.binding_date||''} onChange={e => setForm({...form, binding_date: e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">Close Date</label><input className="form-input" type="date" value={form.close_date||''} onChange={e => setForm({...form, close_date: e.target.value})} /></div>
                        </div>
                        <div className="form-row">
                            <div className="form-group"><label className="form-label">Due Diligence End</label><input className="form-input" type="date" value={form.due_diligence||''} onChange={e => setForm({...form, due_diligence: e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">Financing Contingency</label><input className="form-input" type="date" value={form.financing_contingency||''} onChange={e => setForm({...form, financing_contingency: e.target.value})} /></div>
                        </div>
                        <div className="form-group"><label className="form-label">Split / Notes</label><input className="form-input" value={form.split||''} onChange={e => setForm({...form, split: e.target.value})} /></div>
                        <div style={{display:'flex',gap:'12px',justifyContent:'flex-end',marginTop:'16px'}}>
                            <button className="btn btn-outline" onClick={() => setShowModal(false)}>Cancel</button>
                            <button className="btn btn-primary" onClick={saveDeal}>{editDeal ? 'Save Changes' : 'Create Deal'}</button>
                        </div>
                    </div>
                </div>
            )}
        </>
    );
}

// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ Scoreboard Page ГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function ScoreboardPage({ deals, kpis, goals }) {
    const [view, setView] = useState('ratios');
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth() + 1;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    const agentData = AGENTS.filter(a => a.role !== 'Admin').map(agent => {
        const agentKpis = kpis.filter(k => k.agent === agent.name && k.year === currentYear);
        const totalCalls = agentKpis.reduce((s, k) => s + (k.calls || 0), 0);
        const totalAppts = agentKpis.reduce((s, k) => s + (k.appointments || 0), 0);
        const totalContracts = agentKpis.reduce((s, k) => s + (k.contracts || 0), 0);
        const totalListings = agentKpis.reduce((s, k) => s + (k.listings || 0), 0);
        const agentDeals = deals.filter(d => d.agent === agent.name && d.stage === 'Closed');
        const goal = goals.find(g => g.agent === agent.name)?.annual_goal || 0;
        const volume = agentDeals.reduce((s, d) => s + (d.sale_price || 0), 0);

        const callToContact = totalCalls > 0 ? ((totalAppts / totalCalls) * 100).toFixed(1) : '0.0';
        const contactToAppt = totalAppts > 0 ? ((totalContracts / totalAppts) * 100).toFixed(1) : '0.0';
        const apptToContract = totalContracts > 0 ? ((agentDeals.length / totalContracts) * 100).toFixed(1) : '0.0';

        const monthlyData = months.map((m, i) => {
            const mk = agentKpis.find(k => k.month === i + 1);
            return { month: m, calls: mk?.calls || 0, appts: mk?.appointments || 0, contracts: mk?.contracts || 0 };
        });

        let coachTip = '';
        if (parseFloat(callToContact) < 5) coachTip = `${agent.name}'s call-to-contact rate is low (${callToContact}%). Focus on call quality ГўВЂВ” scripts, timing, and tonality.`;
        else if (parseFloat(contactToAppt) < 10) coachTip = `${agent.name} is making contacts but not enough appointments (${contactToAppt}%). Work on the appointment-setting pitch.`;
        else if (totalContracts > 0 && agentDeals.length === 0) coachTip = `${agent.name} has contracts but no closings yet. Focus on getting deals to the finish line.`;
        else if (agentDeals.length > 0) coachTip = `${agent.name} is converting well! Keep the momentum going.`;

        return { agent, totalCalls, totalAppts, totalContracts, totalListings, closedDeals: agentDeals.length, volume, goal, callToContact, contactToAppt, apptToContract, monthlyData, coachTip };
    });

    return (
        <>
            <div className="tab-bar">
                <div className={`tab-item ${view === 'ratios' ? 'active' : ''}`} onClick={() => setView('ratios')}>Ratios & Coaching</div>
                <div className={`tab-item ${view === 'trending' ? 'active' : ''}`} onClick={() => setView('trending')}>Monthly Trending</div>
                <div className={`tab-item ${view === 'leaderboard' ? 'active' : ''}`} onClick={() => setView('leaderboard')}>Leaderboard</div>
            </div>

            {view === 'ratios' && agentData.map(ad => (
                <div key={ad.agent.name} className="card" style={{marginBottom:'16px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                        <h4 style={{color: ad.agent.color, fontSize:'16px'}}>{ad.agent.name}</h4>
                        <div style={{fontSize:'13px',color:'#94a3b8'}}>Goal: ${(ad.goal/1000000).toFixed(1)}M | Volume: ${(ad.volume/1000).toFixed(0)}K</div>
                    </div>
                    <div className="ratio-grid">
                        <div className="ratio-item"><div className="ratio-value" style={{color:'#6366f1'}}>{ad.totalCalls}</div><div className="ratio-label">Calls</div></div>
                        <div className="ratio-item"><div className="ratio-value" style={{color:'#3b82f6'}}>{ad.totalAppts}</div><div className="ratio-label">Appts</div></div>
                        <div className="ratio-item"><div className="ratio-value" style={{color:'#22c55e'}}>{ad.totalContracts}</div><div className="ratio-label">Contracts</div></div>
                        <div className="ratio-item"><div className="ratio-value" style={{color:'#eab308'}}>{ad.closedDeals}</div><div className="ratio-label">Closed</div></div>
                        <div className="ratio-item"><div className="ratio-value" style={{color:'#a855f7'}}>{ad.callToContact}%</div><div className="ratio-label">CallГўВ†В’Contact</div></div>
                        <div className="ratio-item"><div className="ratio-value" style={{color:'#ec4899'}}>{ad.contactToAppt}%</div><div className="ratio-label">ContactГўВ†В’Appt</div></div>
                    </div>
                    {ad.coachTip && <div className="coaching-tip"><strong>Coaching:</strong> {ad.coachTip}</div>}
                </div>
            ))}

            {view === 'trending' && agentData.map(ad => (
                <div key={ad.agent.name} className="card" style={{marginBottom:'16px'}}>
                    <h4 style={{color: ad.agent.color, marginBottom:'12px'}}>{ad.agent.name} ГўВЂВ” Monthly Calls</h4>
                    <div style={{display:'flex',alignItems:'end',gap:'6px',height:'80px'}}>
                        {ad.monthlyData.map((m, i) => {
                            const max = Math.max(...ad.monthlyData.map(x => x.calls), 1);
                            const h = (m.calls / max) * 100;
                            return (
                                <div key={m.month} style={{flex:1,textAlign:'center'}}>
                                    <div style={{fontSize:'10px',color:'#e2e8f0',marginBottom:'2px'}}>{m.calls > 0 ? m.calls : ''}</div>
                                    <div style={{height: Math.max(h, 4) + 'px', background: i + 1 === currentMonth ? ad.agent.color : 'rgba(99,102,241,0.2)', borderRadius:'3px 3px 0 0'}}></div>
                                    <div style={{fontSize:'9px',color:'#64748b',marginTop:'2px'}}>{m.month}</div>
                                </div>
                            );
                        })}
                    </div>
                    <div style={{display:'flex',gap:'6px',height:'60px',alignItems:'end',marginTop:'16px'}}>
                        {ad.monthlyData.map((m, i) => {
                            const max = Math.max(...ad.monthlyData.map(x => x.appts), 1);
                            const h = (m.appts / max) * 100;
                            return (
                                <div key={m.month + 'a'} style={{flex:1,textAlign:'center'}}>
                                    <div style={{fontSize:'10px',color:'#e2e8f0',marginBottom:'2px'}}>{m.appts > 0 ? m.appts : ''}</div>
                                    <div style={{height: Math.max(h, 4) + 'px', background: i + 1 === currentMonth ? '#22c55e' : 'rgba(34,197,94,0.2)', borderRadius:'3px 3px 0 0'}}></div>
                                    <div style={{fontSize:'9px',color:'#64748b',marginTop:'2px'}}>{m.month}</div>
                                </div>
                            );
                        })}
                    </div>
                    <div style={{fontSize:'11px',color:'#64748b',marginTop:'8px'}}>Top: Calls | Bottom: Appointments</div>
                </div>
            ))}

            {view === 'leaderboard' && (
                <div className="card">
                    <table>
                        <thead><tr><th>Rank</th><th>Agent</th><th>Closed</th><th>Volume</th><th>Calls</th><th>Appts</th><th>% to Goal</th></tr></thead>
                        <tbody>
                            {[...agentData].sort((a, b) => b.volume - a.volume).map((ad, i) => (
                                <tr key={ad.agent.name}>
                                    <td style={{fontWeight:'bold',color: i === 0 ? '#eab308' : '#e2e8f0'}}>{i === 0 ? 'Г°ВџВҐВ‡' : i === 1 ? 'Г°ВџВҐВ€' : i === 2 ? 'Г°ВџВҐВ‰' : i + 1}</td>
                                    <td style={{color: ad.agent.color, fontWeight:600}}>{ad.agent.name}</td>
                                    <td>{ad.closedDeals}</td>
                                    <td>${(ad.volume/1000).toFixed(0)}K</td>
                                    <td>{ad.totalCalls}</td>
                                    <td>{ad.totalAppts}</td>
                                    <td>{ad.goal > 0 ? ((ad.volume / ad.goal) * 100).toFixed(0) + '%' : 'ГўВЂВ”'}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            )}
        </>
    );
}

// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ Tasks Page ГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function TasksPage({ tasks, setTasks, currentUser }) {
    const [showModal, setShowModal] = useState(false);
    const [form, setForm] = useState({});
    const [filter, setFilter] = useState('mine');
    const isAdmin = currentUser.role === 'Admin' || currentUser.role === 'Team Lead';

    const filtered = filter === 'all' ? tasks : filter === 'mine' ? tasks.filter(t => t.assignee === currentUser.name || t.assignee === currentUser.fullName) : tasks.filter(t => t.status === filter);

    const addTask = async () => {
        const data = { title: form.title, assignee: form.assignee || currentUser.name, due_date: form.due_date || null, status: 'todo', priority: form.priority || 'medium', updated_at: new Date().toISOString() };
        const { data: nt, error } = await sb.from('tasks').insert(data).select();
        if (!error && nt) {
            setTasks(prev => [...prev, nt[0]]);
            if (form.notify && form.assignee) {
                // SMS notification would be sent via scheduled task
                alert(`Task assigned to ${form.assignee}. SMS notification will be sent.`);
            }
        }
        setShowModal(false);
        setForm({});
    };

    const updateStatus = async (task, newStatus) => {
        const { error } = await sb.from('tasks').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', task.id);
        if (!error) setTasks(prev => prev.map(t => t.id === task.id ? {...t, status: newStatus} : t));
    };

    const priorityColor = (p) => ({ high: '#ef4444', medium: '#eab308', low: '#22c55e' }[p] || '#94a3b8');
    const statusBadge = (s) => ({ todo: 'badge-gray', 'in-progress': 'badge-blue', done: 'badge-green' }[s] || 'badge-gray');

    const pendingCount = tasks.filter(t => t.status !== 'done' && (t.assignee === currentUser.name || t.assignee === currentUser.fullName)).length;

    return (
        <>
            <div style={{display:'flex',gap:'8px',marginBottom:'20px',flexWrap:'wrap',alignItems:'center'}}>
                <div className={`tab-item ${filter === 'mine' ? 'active' : ''}`} onClick={() => setFilter('mine')}>My Tasks {pendingCount > 0 && <span className="notification-badge" style={{marginLeft:'6px'}}>{pendingCount}</span>}</div>
                <div className={`tab-item ${filter === 'all' ? 'active' : ''}`} onClick={() => setFilter('all')}>All Tasks</div>
                <div className={`tab-item ${filter === 'todo' ? 'active' : ''}`} onClick={() => setFilter('todo')}>To Do</div>
                <div className={`tab-item ${filter === 'in-progress' ? 'active' : ''}`} onClick={() => setFilter('in-progress')}>In Progress</div>
                <div className={`tab-item ${filter === 'done' ? 'active' : ''}`} onClick={() => setFilter('done')}>Done</div>
                <div style={{flex:1}}></div>
                {isAdmin && <button className="btn btn-primary" onClick={() => { setForm({ assignee: '', notify: true }); setShowModal(true); }}>+ Assign Task</button>}
            </div>

            {filtered.map(t => (
                <div key={t.id} className="card" style={{display:'flex',gap:'16px',alignItems:'center',padding:'16px'}}>
                    <div style={{width:'4px',height:'40px',borderRadius:'2px',background: priorityColor(t.priority)}}></div>
                    <div style={{flex:1}}>
                        <div style={{fontWeight:500,marginBottom:'4px'}}>{t.title}</div>
                        <div style={{fontSize:'12px',color:'#64748b'}}>Assigned to: {t.assignee || 'Unassigned'} {t.due_date && `| Due: ${t.due_date}`}</div>
                    </div>
                    <span className={`badge ${statusBadge(t.status)}`}>{t.status}</span>
                    <div style={{display:'flex',gap:'6px'}}>
                        {t.status !== 'in-progress' && <button className="btn btn-sm btn-outline" onClick={() => updateStatus(t, 'in-progress')}>Start</button>}
                        {t.status !== 'done' && <button className="btn btn-sm btn-outline" style={{borderColor:'rgba(34,197,94,0.3)',color:'#22c55e'}} onClick={() => updateStatus(t, 'done')}>Done</button>}
                    </div>
                </div>
            ))}
            {filtered.length === 0 && <div className="empty-state">No tasks to show</div>}

            {showModal && (
                <div className="modal-overlay" onClick={() => setShowModal(false)}>
                    <div className="modal" style={{width:'450px'}} onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <div className="modal-title">Assign New Task</div>
                            <button className="modal-close" onClick={() => setShowModal(false)}>ГѓВ—</button>
                        </div>
                        <div className="form-group"><label className="form-label">Task Title</label><input className="form-input" value={form.title||''} onChange={e => setForm({...form, title: e.target.value})} /></div>
                        <div className="form-row">
                            <div className="form-group"><label className="form-label">Assign To</label>
                                <select className="form-select" value={form.assignee||''} onChange={e => setForm({...form, assignee: e.target.value})}>
                                    <option value="">Select...</option>
                                    {AGENTS.map(a => <option key={a.name} value={a.name}>{a.name} ({a.role})</option>)}
                                </select></div>
                            <div className="form-group"><label className="form-label">Priority</label>
                                <select className="form-select" value={form.priority||'medium'} onChange={e => setForm({...form, priority: e.target.value})}>
                                    <option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
                                </select></div>
                        </div>
                        <div className="form-group"><label className="form-label">Due Date</label><input className="form-input" type="date" value={form.due_date||''} onChange={e => setForm({...form, due_date: e.target.value})} /></div>
                        <div className="form-group" style={{display:'flex',gap:'8px',alignItems:'center'}}>
                            <input type="checkbox" checked={form.notify||false} onChange={e => setForm({...form, notify: e.target.checked})} style={{accentColor:'#6366f1'}} />
                            <label style={{fontSize:'13px',color:'#94a3b8'}}>Send SMS notification to assignee</label>
                        </div>
                        <div style={{display:'flex',gap:'12px',justifyContent:'flex-end',marginTop:'16px'}}>
                            <button className="btn btn-outline" onClick={() => setShowModal(false)}>Cancel</button>
                            <button className="btn btn-primary" onClick={addTask}>Assign Task</button>
                        </div>
                    </div>
                </div>
            )}
        </>
    );
}

                <table>
                    <thead><tr><th>Title</th><th>Platform</th><th>Stage</th><th>Target Date</th></tr></thead>

                                <td>{c.platform}</td>
                                <td><span className={`badge ${c.stage === 'Published' ? 'badge-green' : c.stage === 'Scheduled' ? 'badge-blue' : 'badge-gray'}`}>{c.stage}</span></td>
                                <td>{c.target_date || 'ГўВЂВ”'}</td>
                            </tr>
                        ))}
                        {content.length === 0 && <tr><td colSpan={4} className="empty-state">No content items yet</td></tr>}
                    </tbody>
                </table>
            </div>

            {showModal && (
                <div className="modal-overlay" onClick={() => setShowModal(false)}>
                    <div className="modal" style={{width:'450px'}} onClick={e => e.stopPropagation()}>
                        <div className="modal-header"><div className="modal-title">New Content</div><button className="modal-close" onClick={() => setShowModal(false)}>ГѓВ—</button></div>
                        <div className="form-group"><label className="form-label">Title</label><input className="form-input" value={form.title||''} onChange={e => setForm({...form, title: e.target.value})} /></div>
                        <div className="form-row">
                            <div className="form-group"><label className="form-label">Platform</label>
                                <select className="form-select" value={form.platform||''} onChange={e => setForm({...form, platform: e.target.value})}>
                                    <option value="">Select...</option>{platforms.map(p => <option key={p} value={p}>{p}</option>)}
                                </select></div>
                            <div className="form-group"><label className="form-label">Stage</label>
                                <select className="form-select" value={form.stage||'Idea'} onChange={e => setForm({...form, stage: e.target.value})}>
                                    {stages.map(s => <option key={s} value={s}>{s}</option>)}
                                </select></div>
                        </div>
                        <div className="form-group"><label className="form-label">Target Date</label><input className="form-input" type="date" value={form.target_date||''} onChange={e => setForm({...form, target_date: e.target.value})} /></div>
                        <div style={{display:'flex',gap:'12px',justifyContent:'flex-end',marginTop:'16px'}}>
                            <button className="btn btn-outline" onClick={() => setShowModal(false)}>Cancel</button>
                            <button className="btn btn-primary" onClick={addContent}>Create</button>
                        </div>
                    </div>
                </div>
            )}
        </>
    );
}

// ГўВ”ВЂГўВ”ВЂГўВ”ВЂ Main App ГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function App() {
    const [currentUser, setCurrentUser] = useState(null);
    const [page, setPage] = useState('overview');
    const [deals, setDeals] = useState([]);
    const [goals, setGoals] = useState([]);
    const [kpis, setKpis] = useState([]);
    const [tasks, setTasks] = useState([]);
    const [content, setContent] = useState([]);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        if (!currentUser) return;
        (async () => {
            setLoading(true);
            const [d, g, k, t, c] = await Promise.all([
                sb.from('deals').select('*').order('created_at', { ascending: false }),
                sb.from('agent_goals').select('*'),
                sb.from('kpis').select('*'),
                sb.from('tasks').select('*').order('created_at', { ascending: false }),
                sb.from('content').select('*').order('created_at', { ascending: false }),
            ]);
            if (d.data) setDeals(d.data);
            if (g.data) setGoals(g.data);
            if (k.data) setKpis(k.data);
            if (t.data) setTasks(t.data);
            if (c.data) setContent(c.data);
            setLoading(false);
        })();
    }, [currentUser]);

    if (!currentUser) return <LoginScreen onLogin={setCurrentUser} />;

    const pages = [
        { id: 'overview', label: 'Overview', icon: 'Г°ВџВ“ВЉ' },
        { id: 'deals', label: 'Deals', icon: 'Г°ВџВЏВ ' },
        { id: 'scoreboard', label: 'Scoreboard', icon: 'Г°ВџВЏВ†' },
        { id: 'tasks', label: 'Tasks', icon: 'ГўВњВ…' },
        { id: 'content', label: 'Content', icon: 'Г°ВџВ“В±' },
    ];

    const pendingTasks = tasks.filter(t => t.status !== 'done' && (t.assignee === currentUser.name || t.assignee === currentUser.fullName)).length;

    const pageTitle = { overview: 'Team Overview', deals: 'Deal Pipeline', scoreboard: 'Scoreboard & Coaching', tasks: 'Tasks', content: 'Content Planner' };

    return (
        <div className="app-container">
            <div className="sidebar">
                <div className="sidebar-header">
                    <div className="sidebar-logo">TCT</div>
                    <div className="sidebar-subtitle">Team Command Center</div>
                </div>
                <div className="nav-items">
                    {pages.map(p => (
                        <div key={p.id} className={`nav-item ${page === p.id ? 'active' : ''}`} onClick={() => setPage(p.id)}>
                            <span className="nav-icon">{p.icon}</span>
                            <span className="nav-label">{p.label}</span>
                            {p.id === 'tasks' && pendingTasks > 0 && <span className="notification-badge">{pendingTasks}</span>}
                        </div>
                    ))}
                </div>
                <div className="user-card">
                    <div className="user-avatar" style={{background: currentUser.color}}>{currentUser.name[0]}</div>
                    <div className="user-info">
                        <div className="user-name">{currentUser.name}</div>
                        <div className="user-role">{currentUser.role}</div>
                    </div>
                </div>
                <button className="logout-btn" onClick={() => { setCurrentUser(null); setPage('overview'); }}>Sign Out</button>
            </div>
            <div className="main-content">
                <div className="page-header">
                    <div className="page-title">{pageTitle[page]}</div>
                    {loading && <div style={{fontSize:'12px',color:'#64748b'}}>Loading...</div>}
                </div>
                <div className="page-content">
                    {page === 'overview' && <OverviewPage deals={deals} goals={goals} kpis={kpis} currentUser={currentUser} />}
                    {page === 'deals' && <DealsPage deals={deals} setDeals={setDeals} currentUser={currentUser} />}
                    {page === 'scoreboard' && <ScoreboardPage deals={deals} kpis={kpis} goals={goals} />}
                    {page === 'tasks' && <TasksPage tasks={tasks} setTasks={setTasks} currentUser={currentUser} />}
                    {page === 'content' && <ContentPage content={content} setContent={setContent} currentUser={currentUser} />}
                </div>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
