<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCT Team Command Center</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0f1117;
            color: #e6edf3;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 10px;
        }

        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #8b949e;
        }

        .sidebar-nav {
            flex: 1;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            font-size: 14px;
        }

        .nav-item:hover {
            background: #0d1117;
        }

        .nav-item.active {
            background: #0d1117;
            border-left-color: #58a6ff;
            color: #58a6ff;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #30363d;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #2ea043;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            background: #0d1117;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 600;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0f1117;
        }

        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-box p {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #0d1117;
            color: #e6edf3;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .form-group input::placeholder {
            color: #6e7681;
        }

        .login-btn,
        .btn-primary,
        .btn-secondary {
            width: 100%;
            padding: 10px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .login-btn:hover,
        .btn-primary:hover {
            background: #2ea043;
        }

        .btn-secondary {
            background: #0d1117;
            color: #58a6ff;
            border: 1px solid #30363d;
        }

        .btn-secondary:hover {
            background: #161b22;
         border-color: #58a6ff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #161b22;

            border-radius: 8px;

        }

        .stat-card h3 {

            font-weight: 600;

            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {

            font-weight: 600;

        }

        .table-container {

            border: 1px solid #30363d;
            border-radius: 8px;

            margin-bottom: 20px;

        .table-header {

            display: flex;

            align-items: center;

        .table-header h3 {

            font-weight: 600;

        .filter-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .filter-controls select {

            border: 1px solid #30363d;
            border-radius: 6px;
            background: #0d1117;
            color: #e6edf3;
            font-size: 13px;

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #0d1117;
            border-bottom: 1px solid #30363d;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #8b949e;
            white-space: nowrap;
        }

        td {

            border-bottom: 1px solid #30363d;
        }

        tbody tr:hover {
            background: #0d1117;
        }

        .table-scrollable {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 8px 16px;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .modal-buttons .btn-primary {
            width: auto;
            background: #238636;
            color: white;
            border: none;
        }

        .modal-buttons .btn-primary:hover {
            background: #2ea043;
        }

        .modal-buttons .btn-secondary {
            width: auto;
            background: transparent;
            color: #58a6ff;
        }

        .modal-buttons .btn-secondary:hover {
            background: #0d1117;
        }

        .error-message {
            color: #f85149;
            font-size: 13px;
            margin-top: 4px;
        }

        .success-message {
            background: #238636;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .trending-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .trending-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }

        .trending-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #58a6ff;
        }

        .trending-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .trending-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
        }

        .trending-card h4 {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .trending-comparison {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 8px;
        }

        .trending-year {
            flex: 1;
            text-align: center;
        }

        .trending-year-label {
            font-size: 11px;
            color: #6e7681;
            margin-bottom: 4px;
        }

        .trending-year-value {
            font-size: 16px;
            font-weight: 600;
            color: #58a6ff;
        }

        .progress-bar {
            background: #30363d;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #58a6ff 0%, #79c0ff 100%);
            border-radius: 2px;
        }

        .agent-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .agent-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
        }

        .agent-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e6edf3;
        }

        .agent-metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .agent-metric-label {
            color: #8b949e;
        }

        .agent-metric-values {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .metric-year {
            text-align: right;
            min-width: 80px;
        }

        .metric-year-label {
            font-size: 10px;
            color: #6e7681;
            display: block;
        }

        .metric-year-value {
            font-size: 13px;
            font-weight: 600;
            color: #58a6ff;
        }

        .metric-change {
            font-size: 12px;
            font-weight: 600;
            min-width: 50px;
            text-align: right;
        }

        .metric-change.positive {
            color: #3fb950;
        }

        .metric-change.negative {
            color: #f85149;
        }

        .metric-change.neutral {
            color: #8b949e;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }

        .spinner {
            border: 2px solid #30363d;
            border-top: 2px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }

        .empty-state h3 {
            margin-bottom: 8px;
            color: #e6edf3;
        }

        .security-info {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #8b949e;
        }

        .security-info strong {
            color: #e6edf3;
        }
        /* Coaching & Pipeline styles */
        .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; }
        .kanban-col { flex: 1; min-width: 280px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        .kanban-col-header { padding: 12px 16px; border-bottom: 1px solid #30363d; font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .kanban-col-body { padding: 8px; min-height: 200px; }
        .kanban-card { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s; }
        .kanban-card:hover { border-color: #58a6ff; }
        .kanban-card h4 { font-size: 13px; margin-bottom: 6px; color: #e6edf3; }
        .kanban-card p { font-size: 12px; color: #8b949e; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-high { background: #f8514922; color: #f85149; }
        .badge-medium { background: #d2992222; color: #d29922; }
        .badge-low { background: #23863622; color: #3fb950; }
        .badge-todo { background: #30363d; color: #8b949e; }
        .badge-in-progress { background: #1f6feb22; color: #58a6ff; }
        .badge-done { background: #23863622; color: #3fb950; }
        .scorecard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
        .scorecard { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .scorecard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .scorecard-header h3 { font-size: 18px; color: #58a6ff; }
        .scorecard-rank { font-size: 24px; font-weight: 700; color: #8b949e; }
        .scorecard-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .scorecard-stat label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
        .scorecard-stat .val { font-size: 18px; font-weight: 600; color: #e6edf3; }
        .activity-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .activity-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; }

        .stage-card { flex: 1; min-width: 160px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; }
        .stage-card .count { font-size: 32px; font-weight: 700; }
        .stage-card .label { font-size: 12px; color: #8b949e; margin-top: 4px; }

        .tab-btn:hover { color: #e6edf3; }

    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createClient } = supabase;

        // Supabase Configuration
        const SUPABASE_URL = 'https://idmxupicsrmbujtrgdrf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkbXh1cGljc3JtYnVqdHJnZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzI5MzAsImV4cCI6MjA5MDIwODkzMH0.0CKwkwS7gmaY8s60bG8ekPaBdFWXFocil8UCaiAa1go';

        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            useEffect(() => {
                // Check if user is logged in
                checkAuth();
            }, []);

            async function checkAuth() {
                try {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session?.user) {
                        setUser(session.user);
                    }
                } catch (error) {
                    console.error('Auth check error:', error);
                } finally {
                    setLoading(false);
                }
            }

            async function handleLogin(e) {
                e.preventDefault();
                setLoginError('');

                // Basic validation
                if (!email || !password) {
                    setLoginError('Please enter both email and password');
                    return;
                }

                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    setLoginError('Please enter a valid email address');
                    return;
                }

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email.trim(),
                        password
                    });

                    if (error) throw error;
                    if (data.user) {
                        setUser(data.user);
                        setEmail('');
                        setPassword('');
                    }
                } catch (error) {
                    setLoginError(error.message || 'Login failed. Please check your credentials.');
                    console.error('Login error:', error);
                }
            }

            async function handleLogout() {
                try {
                    await supabaseClient.auth.signOut();
                    setUser(null);
                    setCurrentPage('dashboard');
                } catch (error) {
                    console.error('Logout error:', error);
                }
            }

            if (loading) {
                return (
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: '#0f1117' }}>
                        <div style={{ textAlign: 'center' }}>
                            <div className="spinner"></div>
                            <p style={{ color: '#8b949e' }}>Loading...</p>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return <LoginPage onLogin={handleLogin} email={email} setEmail={setEmail} password={password} setPassword={setPassword} error={loginError} />;
            }

            return (
                <AppLayout
                    user={user}
                    onLogout={handleLogout}
                    currentPage={currentPage}
                    setCurrentPage={setCurrentPage}
                />
            );
        }

        // Login Page
        function LoginPage({ onLogin, email, setEmail, password, setPassword, error }) {
            return (
                <div className="login-container">
                    <div className="login-box">
                        <h1>TCT Dashboard</h1>
                        <p>Team Command Center for Real Estate</p>
                        <form onSubmit={onLogin}>
                            <div className="form-group">
                                <label>Email</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    placeholder="your@email.com"
                                />
                            </div>
                            <div className="form-group">
                                <label>Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="脙聝脗垄脙聜脗聙脙聜脗垄脙聝脗垄脙聜脗聙脙聜脗垄脙聝脗垄脙聜脗聙脙聜脗垄脙聝脗垄脙聜脗聙脙聜脗垄脙聝脗垄脙聜脗聙脙聜脗垄脙聝脗垄脙聜脗聙脙聜脗垄脙聝脗垄脙聜脗聙脙聜脗垄脙聝脗垄脙聜脗聙脙聜脗垄"
                                />
                            </div>
                            {error && <div className="error-message">{error}</div>}
                            <button type="submit" className="login-btn" style={{ marginTop: '16px' }}>Sign In</button>
                        </form>
                        <p style={{ marginTop: '16px', fontSize: '12px', color: '#6e7681', textAlign: 'center' }}>
                            TCT Team Only - Contact Admin for Access
                        </p>
                    </div>
                </div>
            );
        }

        // App Layout
        function AppLayout({ user, onLogout, currentPage, setCurrentPage }) {
            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div className="sidebar-header">
                            <h1>TCT Dashboard</h1>
                            <p>Real Estate Team</p>
                        </div>
                        <div className="sidebar-nav">
                            <div
                                className={`nav-item ${currentPage === 'dashboard' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('dashboard')}
                            >
                                Dashboard
                            </div>
                            <div
                                className={`nav-item ${currentPage === 'deals' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('deals')}
                            >
                                Deals
                            </div>
                            <div
                                className={`nav-item ${currentPage === 'trending' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('trending')}
                            >

        // Dashboard Page
        function DashboardPage() {
            const [stats, setStats] = useState({ totalVolume: 0, totalDeals: 0, totalGCI: 0 });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadStats();
            }, []);

            async function loadStats() {
                try {
                    const { data, error } = await supabaseClient
                        .from('deals')
                        .select('sale_price, gross_commission');

                    if (error) throw error;

                    const totalVolume = data.reduce((sum, deal) => sum + (deal.sale_price || 0), 0);
                    const totalGCI = data.reduce((sum, deal) => sum + (deal.gross_commission || 0), 0);

                    setStats({
                        totalVolume,
                        totalDeals: data.length,
                        totalGCI
                    });
                } catch (error) {
                    console.error('Error loading stats:', error);
                } finally {
                    setLoading(false);
                }
            }

            if (loading) {
                return <div className="loading"><div className="spinner"></div>Loading dashboard...</div>;
            }

            return (
                <>
                    <div className="header">
                        <h2>Dashboard</h2>
                    </div>
                    <div className="content">
                        <div className="security-info">
                            <strong>Security Notice:</strong> This dashboard uses Supabase's read-only anonymous key for client-side data access. All forms include input validation. The Supabase API is configured with Row Level Security (RLS) policies to control data access.

                        <div className="stats-grid">

        // Trending Page
                        function TrendingPage() {
            const [trendingData, setTrendingData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [selectedAgent, setSelectedAgent] = useState('Team');

            useEffect(() => { loadTrendingData(); }, []);

            async function loadTrendingData() {
                try {
                    const { data, error } = await supabaseClient.from('deals').select('*');
                    if (error) throw error;

                    const years = {};
                    const allAgents = new Set();

                    data.forEach(deal => {
                        const year = deal.year || 2026;
                        const volume = deal.sale_price || 0;
                        const gci = deal.gross_commission || 0;
                        const agent = deal.agent || 'Unknown';
                        allAgents.add(agent);

                        if (!years[year]) years[year] = { volume: 0, deals: 0, gci: 0, agents: {} };
                        years[year].volume += volume;
                        years[year].deals += 1;
                        years[year].gci += gci;

                        if (!years[year].agents[agent]) years[year].agents[agent] = { volume: 0, deals: 0, gci: 0 };
                        years[year].agents[agent].volume += volume;
                        years[year].agents[agent].deals += 1;
                        years[year].agents[agent].gci += gci;
                    });

                    setTrendingData({ years, agents: Array.from(allAgents).sort() });
                } catch (error) {
                    console.error('Error loading trending data:', error);
                } finally {
                    setLoading(false);
                }
            }

            if (loading) return (<><div className="header"><h2>Year-over-Year Trending</h2></div><div className="content"><div className="loading"><div className="spinner"></div>Loading...</div></div></>);
            if (!trendingData) return (<><div className="header"><h2>Year-over-Year Trending</h2></div><div className="content"><div className="empty-state"><h3>No data available</h3></div></div></>);

            const { years, agents } = trendingData;
            const sortedYears = Object.keys(years).map(Number).sort();
            const coreAgents = ['Addison', 'Will', 'Ron', 'Zach'];
            const formatM = v => v >= 1000000 ? `$${(v/1000000).toFixed(1)}M` : `$${(v/1000).toFixed(0)}K`;
            const formatK = v => `$${(v/1000).toFixed(0)}K`;
            const pctChange = (prev, curr) => prev === 0 ? '--' : `${((curr - prev) / prev * 100).toFixed(0)}%`;

                function ClosingsPage() {
            const [deals, setDeals] = useState([]);
            const [loading, setLoading] = useState(true);
            const coreAgents = ['Addison Corbin','Will Nix','Ron Corbin','Zach Corbin'];

            useEffect(() => { loadDeals(); }, []);

            async function loadDeals() {
                try {
                    const { data } = await supabaseClient.from('deals').select('*').order('close_date', { ascending: false });
                    setDeals(data || []);
                } catch(e) { console.error(e); }
                setLoading(false);
            }

            const currentYear = new Date().getFullYear();
            const thisYearDeals = deals.filter(d => {
                const y = d.close_date ? new Date(d.close_date).getFullYear() : null;
                return y === currentYear;
            });

            const statusGroups = { 'Active': [], 'Under Contract': [], 'Closed': [], 'Withdrawn/Expired': [] };
            thisYearDeals.forEach(d => {
                const s = (d.status || '').toLowerCase();
                if (s.includes('close') || s.includes('sold')) statusGroups['Closed'].push(d);
                else if (s.includes('contract') || s.includes('pending')) statusGroups['Under Contract'].push(d);
                else if (s.includes('withdraw') || s.includes('expir') || s.includes('cancel')) statusGroups['Withdrawn/Expired'].push(d);
                else statusGroups['Active'].push(d);
            });

            const agentStats = {};
            coreAgents.forEach(a => { agentStats[a] = { total: 0, closed: 0, volume: 0, gci: 0 }; });
            thisYearDeals.forEach(d => {
                const agent = d.agent_name || 'Unknown';
                if (agentStats[agent]) {
                    agentStats[agent].total++;
                    const s = (d.status || '').toLowerCase();
                    if (s.includes('close') || s.includes('sold')) {
                        agentStats[agent].closed++;
                        agentStats[agent].volume += (d.sale_price || 0);
                        agentStats[agent].gci += (d.gci || 0);
                    }
                }
            });

            if (loading) return <div className="content"><p>Loading closings...</p></div>;

            return (
                <>
                    <div className="header"><h2>Closings Tracker - {currentYear}</h2></div>

                                <div className="label">Withdrawn/Expired</div>

                            <div className="table-header"><h3>Agent Closing Summary</h3></div>
                            <div className="table-scrollable">
                                <table>
                                    <thead><tr><th>Agent</th><th>Total Deals</th><th>Closed</th><th>Close Rate</th><th>Closed Volume</th><th>GCI</th></tr></thead>

                                            return (

                                                    <td style={{color:'#3fb950'}}>{s.closed}</td>

                        <div className="table-container" style={{marginTop:'16px'}}>

        // ==================== ACTIVITY PAGE (FUB) ====================
        function ActivityPage() {
            const [fubKey, setFubKey] = useState(localStorage.getItem('fub_api_key') || '');
            const [keyInput, setKeyInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [stats, setStats] = useState(null);
            const [dateRange, setDateRange] = useState('month');
            const [error, setError] = useState('');

            useEffect(() => { if (fubKey) fetchCallData(); }, [fubKey, dateRange]);

            function getDateFilter() {
                const now = new Date();
                if (dateRange === 'week') {
                    const d = new Date(now); d.setDate(d.getDate() - 7);
                    return d.toISOString().split('T')[0];
                } else if (dateRange === 'month') {
                    return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-01';
                } else {
                    return now.getFullYear() + '-01-01';
                }
            }

            async function fetchCallData() {
                setLoading(true);
                setError('');
                try {
                    const encoded = btoa(fubKey + ':');
                    const headers = { 'Authorization': 'Basic ' + encoded };
                    const dateFilter = getDateFilter();
                    const result = { total: 0, connected: 0, noAnswer: 0, outbound: 0, inbound: 0, totalDuration: 0, agents: {}, pages: 0 };

                    let url = 'https://api.followupboss.com/v1/calls?limit=100&createdAfter=' + dateFilter;
                    while (url && result.pages < 50) {
                        const resp = await fetch(url, { headers });
                        if (!resp.ok) throw new Error('FUB API error: ' + resp.status);
                        const data = await resp.json();
                        const calls = data.calls || [];
                        result.pages++;
                        result.total += calls.length;

                        calls.forEach(c => {
                            const connected = c.outcome === null || c.outcome === 'Connected';
                            if (connected) result.connected++; else result.noAnswer++;
                            if (c.isIncoming) result.inbound++; else result.outbound++;
                            result.totalDuration += (c.duration || 0);
                            const agent = c.userName || 'Unknown';
                            if (!result.agents[agent]) result.agents[agent] = { total: 0, connected: 0, noAnswer: 0, outbound: 0, duration: 0 };
                            result.agents[agent].total++;
                            if (connected) result.agents[agent].connected++;
                            else result.agents[agent].noAnswer++;
                            if (!c.isIncoming) result.agents[agent].outbound++;
                            result.agents[agent].duration += (c.duration || 0);
                        });
                        url = data._metadata?.nextLink || null;
                    }
                    setStats(result);
                } catch(e) {
                    setError(e.message);
                    if (e.message.includes('401') || e.message.includes('403')) {
                        localStorage.removeItem('fub_api_key');
                        setFubKey('');
                    }
                }
                setLoading(false);
            }

            function saveKey() {
                if (keyInput.trim()) {
                    localStorage.setItem('fub_api_key', keyInput.trim());
                    setFubKey(keyInput.trim());
                }
            }

            function formatMin(sec) { return (sec / 60).toFixed(0) + ' min'; }

            if (!fubKey) {
                return (
                    <>
                        <div className="header"><h2>Activity - Call Ratios</h2></div>
                        <div className="content">
                            <div className="fub-prompt">
                                <h3 style={{marginBottom:'8px'}}>Connect Follow Up Boss</h3>
                                <p style={{color:'#8b949e',marginBottom:'12px'}}>Enter your FUB API key to pull call data. Find it at Admin &rarr; API in Follow Up Boss.</p>
                                <div className="form-group" style={{maxWidth:'400px',margin:'0 auto'}}>
                                    <input type="text" value={keyInput} onChange={e => setKeyInput(e.target.value)} placeholder="fka_XXXX..." />
                                </div>
                                <button className="btn-primary" style={{width:'auto',padding:'8px 24px'}} onClick={saveKey}>Connect</button>
                            </div>
                        </div>
                    </>
                );
            }

            return (
                <>
                    <div className="header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <h2>Activity - Call Ratios</h2>
                        <div style={{display:'flex',gap:'8px'}}>
                            {['week','month','year'].map(r => (
                                <button key={r} onClick={() => setDateRange(r)}
                                    style={{padding:'4px 12px',borderRadius:'6px',border:'1px solid '+(dateRange===r?'#58a6ff':'#30363d'),
                                    background:dateRange===r?'#58a6ff':'#21262d',color:dateRange===r?'#fff':'#c9d1d9',
                                    cursor:'pointer',fontSize:'12px',textTransform:'capitalize'}}>{r}</button>
                            ))}
                        </div>
                    </div>
                    <div className="content">
                        {loading && <p>Loading call data from FUB...</p>}
                        {error && <div className="error-message">{error}</div>}
                        {stats && (
                            <>
                                <div className="activity-summary">
                                    <div className="activity-card"><div className="val">{stats.total}</div><label>Total Calls</label></div>
                                    <div className="activity-card"><div className="val" style={{color:'#3fb950'}}>{stats.connected}</div><label>Connected</label></div>
                                    <div className="activity-card"><div className="val" style={{color:'#f85149'}}>{stats.noAnswer}</div><label>No Answer</label></div>
                                    <div className="activity-card"><div className="val">{stats.total > 0 ? ((stats.connected/stats.total)*100).toFixed(0) + '%' : '--'}</div><label>Connect Rate</label></div>
                                    <div className="activity-card"><div className="val">{stats.outbound}</div><label>Outbound</label></div>
                                    <div className="activity-card"><div className="val">{formatMin(stats.totalDuration)}</div><label>Talk Time</label></div>
                                </div>

                                <div className="table-container">
                                    <div className="table-header"><h3>By Agent</h3></div>
                                    <div className="table-scrollable">
                                        <table>
                                            <thead><tr><th>Agent</th><th>Total</th><th>Connected</th><th>No Answer</th><th>Connect Rate</th><th>Outbound</th><th>Talk Time</th></tr></thead>
                                            <tbody>
                                                {Object.entries(stats.agents).sort((a,b) => b[1].total - a[1].total).map(([name, s]) => (
                                                    <tr key={name}>
                                                        <td style={{color:'#58a6ff',fontWeight:600}}>{name}</td>
                                                        <td>{s.total}</td>
                                                        <td style={{color:'#3fb950'}}>{s.connected}</td>
                                                        <td style={{color:'#f85149'}}>{s.noAnswer}</td>
                                                        <td>{s.total > 0 ? ((s.connected/s.total)*100).toFixed(0)+'%' : '--'}</td>
                                                        <td>{s.outbound}</td>
                                                        <td>{formatMin(s.duration)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                </>
            );
        }

        // ==================== SCORECARDS PAGE ====================
        function ScorecardsPage() {
            const [deals, setDeals] = useState([]);
            const [loading, setLoading] = useState(true);
            const coreAgents = ['Addison Corbin','Will Nix','Ron Corbin','Zach Corbin'];

            useEffect(() => { loadData(); }, []);

            async function loadData() {
                try {
                    const { data } = await supabaseClient.from('deals').select('*');
                    setDeals(data || []);
                } catch(e) { console.error(e); }
                setLoading(false);
            }

            const currentYear = new Date().getFullYear();

            function agentData(agent) {
                const allDeals = deals.filter(d => d.agent_name === agent);
                const ytd = allDeals.filter(d => d.close_date && new Date(d.close_date).getFullYear() === currentYear);
                const prevYear = allDeals.filter(d => d.close_date && new Date(d.close_date).getFullYear() === currentYear - 1);
                const vol = ytd.reduce((s,d) => s + (d.sale_price || 0), 0);
                const gci = ytd.reduce((s,d) => s + (d.gci || 0), 0);
                const prevVol = prevYear.reduce((s,d) => s + (d.sale_price || 0), 0);
                const avgPrice = ytd.length > 0 ? vol / ytd.length : 0;
                return { deals: ytd.length, volume: vol, gci, avgPrice, prevDeals: prevYear.length, prevVol, totalCareer: allDeals.length };
            }

            const scorecards = coreAgents.map(a => ({ name: a, ...agentData(a) }));
            scorecards.sort((a,b) => b.volume - a.volume);

            if (loading) return <div className="content"><p>Loading scorecards...</p></div>;

            return (
                <>
                    <div className="header"><h2>Agent Scorecards - {currentYear}</h2></div>
                    <div className="content">
                        <div className="scorecard-grid">
                            {scorecards.map((sc, i) => {
                                const volChange = sc.prevVol > 0 ? (((sc.volume - sc.prevVol) / sc.prevVol) * 100).toFixed(0) : '--';
                                const dealChange = sc.prevDeals > 0 ? (((sc.deals - sc.prevDeals) / sc.prevDeals) * 100).toFixed(0) : '--';
                                return (
                                    <div className="scorecard" key={sc.name}>
                                        <div className="scorecard-header">
                                            <h3>{sc.name}</h3>
                                            <div className="scorecard-rank">#{i+1}</div>
                                        </div>
                                        <div className="scorecard-stats">
                                            <div className="scorecard-stat">
                                                <label>YTD Volume</label>
                                                <div className="val">${(sc.volume/1000000).toFixed(2)}M</div>
                                            </div>
                                            <div className="scorecard-stat">
                                                <label>YTD Deals</label>
                                                <div className="val">{sc.deals}</div>
                                            </div>
                                            <div className="scorecard-stat">
                                                <label>GCI</label>
                                                <div className="val">${(sc.gci/1000).toFixed(1)}K</div>
                                            </div>
                                            <div className="scorecard-stat">
                                                <label>Avg Price</label>
                                                <div className="val">${(sc.avgPrice/1000).toFixed(0)}K</div>
                                            </div>
                                            <div className="scorecard-stat">
                                                <label>Vol vs {currentYear-1}</label>
                                                <div className="val" style={{color: volChange !== '--' && parseInt(volChange) >= 0 ? '#3fb950' : '#f85149'}}>{volChange}%</div>
                                            </div>
                                            <div className="scorecard-stat">
                                                <label>Deals vs {currentYear-1}</label>
                                                <div className="val" style={{color: dealChange !== '--' && parseInt(dealChange) >= 0 ? '#3fb950' : '#f85149'}}>{dealChange}%</div>
                                            </div>
                                        </div>
                                        <div style={{marginTop:'12px',fontSize:'12px',color:'#6e7681'}}>Career total: {sc.totalCareer} deals</div>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="table-container" style={{marginTop:'20px'}}>
                            <div className="table-header"><h3>Leaderboard</h3></div>
                            <div className="table-scrollable">
                                <table>
                                    <thead><tr><th>Rank</th><th>Agent</th><th>Volume</th><th>Deals</th><th>GCI</th><th>Avg Price</th></tr></thead>
                                    <tbody>
                                        {scorecards.map((sc, i) => (
                                            <tr key={sc.name}>
                                                <td style={{fontWeight:700,color:i===0?'#d29922':i===1?'#8b949e':i===2?'#da7b3a':'#6e7681'}}>#{i+1}</td>
                                                <td style={{color:'#58a6ff',fontWeight:600}}>{sc.name}</td>
                                                <td>${(sc.volume/1000000).toFixed(2)}M</td>
                                                <td>{sc.deals}</td>
                                                <td>${(sc.gci/1000).toFixed(1)}K</td>
                                                <td>${(sc.avgPrice/1000).toFixed(0)}K</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        // ==================== COACHING PAGE ====================
        function CoachingPage() {
            const coreAgents = ['Addison Corbin','Will Nix','Ron Corbin','Zach Corbin'];
            const [tasks, setTasks] = useState([]);
            const [notes, setNotes] = useState([]);
            const [selectedAgent, setSelectedAgent] = useState('All');
            const [tab, setTab] = useState('tasks');
            const [showAddTask, setShowAddTask] = useState(false);
            const [showAddNote, setShowAddNote] = useState(false);
            const [newTask, setNewTask] = useState({ agent_name: '', title: '', description: '', priority: 'medium', due_date: '', status: 'todo' });
            const [newNote, setNewNote] = useState({ agent_name: '', note: '' });
            const [loading, setLoading] = useState(true);
            const [dbReady, setDbReady] = useState(true);

            useEffect(() => { loadAll(); }, []);

            async function loadAll() {
                try {
                    const { data: t, error: te } = await supabaseClient.from('coaching_tasks').select('*').order('created_at', { ascending: false });
                    if (te) { if (te.code === '42P01') { setDbReady(false); setLoading(false); return; } throw te; }
                    setTasks(t || []);
                    const { data: n } = await supabaseClient.from('coaching_notes').select('*').order('created_at', { ascending: false });
                    setNotes(n || []);
                } catch(e) { console.error(e); setDbReady(false); }
                setLoading(false);
            }

            async function addTask() {
                if (!newTask.title || !newTask.agent_name) return;
                const { error } = await supabaseClient.from('coaching_tasks').insert([newTask]);
                if (!error) { setShowAddTask(false); setNewTask({ agent_name: '', title: '', description: '', priority: 'medium', due_date: '', status: 'todo' }); loadAll(); }
            }

            async function addNote() {
                if (!newNote.note || !newNote.agent_name) return;
                const { error } = await supabaseClient.from('coaching_notes').insert([newNote]);
                if (!error) { setShowAddNote(false); setNewNote({ agent_name: '', note: '' }); loadAll(); }
            }

            async function updateTaskStatus(id, status) {
                await supabaseClient.from('coaching_tasks').update({ status, updated_at: new Date().toISOString() }).eq('id', id);
                loadAll();
            }

            async function deleteTask(id) {
                await supabaseClient.from('coaching_tasks').delete().eq('id', id);
                loadAll();
            }

            const filteredTasks = selectedAgent === 'All' ? tasks : tasks.filter(t => t.agent_name === selectedAgent);
            const filteredNotes = selectedAgent === 'All' ? notes : notes.filter(n => n.agent_name === selectedAgent);
            const todoCols = { 'todo': filteredTasks.filter(t => t.status === 'todo'), 'in_progress': filteredTasks.filter(t => t.status === 'in_progress'), 'done': filteredTasks.filter(t => t.status === 'done') };

            if (loading) return <div className="content"><p>Loading coaching data...</p></div>;

            if (!dbReady) return (
                <>
                    <div className="header"><h2>Coaching</h2></div>
                    <div className="content">
                        <div className="fub-prompt">
                            <h3>Set Up Coaching Tables</h3>
                            <p style={{color:'#8b949e',margin:'12px 0'}}>The coaching tables haven't been created yet. Run this SQL in your Supabase SQL Editor:</p>
                            <pre style={{background:'#0d1117',padding:'16px',borderRadius:'6px',textAlign:'left',fontSize:'12px',overflow:'auto',maxWidth:'600px',margin:'0 auto'}}>
{`CREATE TABLE coaching_tasks (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  agent_name text NOT NULL,
  title text NOT NULL,
  description text DEFAULT '',
  status text DEFAULT 'todo',
  priority text DEFAULT 'medium',
  due_date date,
  created_by text DEFAULT '',
  created_at timestamptz DEFAULT now(),
  updated_at timestamptz DEFAULT now()
);

CREATE TABLE coaching_notes (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  agent_name text NOT NULL,
  note text NOT NULL,
  created_by text DEFAULT '',
  created_at timestamptz DEFAULT now()
);

ALTER TABLE coaching_tasks ENABLE ROW LEVEL SECURITY;
ALTER TABLE coaching_notes ENABLE ROW LEVEL SECURITY;
CREATE POLICY "auth_all" ON coaching_tasks FOR ALL TO authenticated USING (true) WITH CHECK (true);
CREATE POLICY "auth_all" ON coaching_notes FOR ALL TO authenticated USING (true) WITH CHECK (true);`}
                            </pre>
                            <button className="btn-primary" style={{marginTop:'16px',width:'auto',padding:'8px 24px'}} onClick={loadAll}>I've created the tables - Retry</button>
                        </div>
                    </div>
                </>
            );

            return (
                <>
                    <div className="header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <h2>Coaching</h2>
                        <div style={{display:'flex',gap:'8px'}}>
                            <button className="btn-primary" style={{width:'auto',padding:'6px 16px',fontSize:'13px'}} onClick={() => setShowAddTask(true)}>+ Task</button>
                            <button className="btn-secondary" style={{width:'auto',padding:'6px 16px',fontSize:'13px'}} onClick={() => setShowAddNote(true)}>+ Note</button>
                        </div>
                    </div>
                    <div className="content">
                        <div style={{marginBottom:'16px',display:'flex',gap:'8px',flexWrap:'wrap'}}>
                            {['All', ...coreAgents].map(a => (
                                <button key={a} onClick={() => setSelectedAgent(a)}
                                    style={{padding:'4px 14px',borderRadius:'6px',border:'1px solid '+(selectedAgent===a?'#58a6ff':'#30363d'),
                                    background:selectedAgent===a?'#58a6ff':'#21262d',color:selectedAgent===a?'#fff':'#c9d1d9',cursor:'pointer',fontSize:'12px'}}>
                                    {a}
                                </button>
                            ))}
                        </div>

                        <div className="tab-bar">
                            <button className={'tab-btn '+(tab==='tasks'?'active':'')} onClick={() => setTab('tasks')}>Task Board ({filteredTasks.length})</button>
                            <button className={'tab-btn '+(tab==='notes'?'active':'')} onClick={() => setTab('notes')}>Notes ({filteredNotes.length})</button>
                        </div>

                        {tab === 'tasks' && (
                            <div className="kanban-board">
                                {[['todo','To Do','#8b949e'],['in_progress','In Progress','#58a6ff'],['done','Done','#3fb950']].map(([key, label, color]) => (
                                    <div className="kanban-col" key={key}>
                                        <div className="kanban-col-header" style={{color}}>
                                            {label}
                                            <span className={'badge badge-' + key}>{todoCols[key].length}</span>
                                        </div>
                                        <div className="kanban-col-body">
                                            {todoCols[key].map(t => (
                                                <div className="kanban-card" key={t.id}>
                                                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'start'}}>
                                                        <h4>{t.title}</h4>
                                                        <span className={'badge badge-' + t.priority} style={{flexShrink:0}}>{t.priority}</span>
                                                    </div>
                                                    <p>{t.agent_name}</p>
                                                    {t.description && <p style={{marginTop:'4px'}}>{t.description}</p>}
                                                    {t.due_date && <p style={{marginTop:'4px',color:'#d29922'}}>Due: {t.due_date}</p>}
                                                    <div style={{marginTop:'8px',display:'flex',gap:'4px'}}>
                                                        {key !== 'todo' && <button onClick={() => updateTaskStatus(t.id, key === 'done' ? 'in_progress' : 'todo')} style={{fontSize:'11px',padding:'2px 8px',border:'1px solid #30363d',borderRadius:'4px',background:'#21262d',color:'#c9d1d9',cursor:'pointer'}}>&larr;</button>}
                                                        {key !== 'done' && <button onClick={() => updateTaskStatus(t.id, key === 'todo' ? 'in_progress' : 'done')} style={{fontSize:'11px',padding:'2px 8px',border:'1px solid #30363d',borderRadius:'4px',background:'#21262d',color:'#c9d1d9',cursor:'pointer'}}>&rarr;</button>}
                                                        <button onClick={() => deleteTask(t.id)} style={{fontSize:'11px',padding:'2px 8px',border:'1px solid #f8514933',borderRadius:'4px',background:'transparent',color:'#f85149',cursor:'pointer',marginLeft:'auto'}}>x</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'notes' && (
                            <div>
                                {filteredNotes.length === 0 && <p style={{color:'#6e7681',textAlign:'center',padding:'40px'}}>No coaching notes yet. Click + Note to add one.</p>}
                                {filteredNotes.map(n => (
                                    <div className="note-card" key={n.id}>
                                        <div style={{display:'flex',justifyContent:'space-between'}}>
                                            <span style={{color:'#58a6ff',fontWeight:600,fontSize:'13px'}}>{n.agent_name}</span>
                                        </div>
                                        <p style={{marginTop:'6px',fontSize:'13px',color:'#e6edf3',whiteSpace:'pre-wrap'}}>{n.note}</p>
                                        <div className="meta">{new Date(n.created_at).toLocaleDateString()}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {showAddTask && (
                        <div className="modal-overlay" onClick={() => setShowAddTask(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2>New Coaching Task</h2>
                                <div className="form-group">
                                    <label>Agent</label>
                                    <select value={newTask.agent_name} onChange={e => setNewTask({...newTask, agent_name: e.target.value})}>
                                        <option value="">Select agent...</option>
                                        {coreAgents.map(a => <option key={a} value={a}>{a}</option>)}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Task</label>
                                    <input value={newTask.title} onChange={e => setNewTask({...newTask, title: e.target.value})} placeholder="e.g. Follow up with 5 leads this week" />
                                </div>
                                <div className="form-group">
                                    <label>Details</label>
                                    <textarea rows={3} value={newTask.description} onChange={e => setNewTask({...newTask, description: e.target.value})} placeholder="Optional notes..." />
                                </div>
                                <div style={{display:'flex',gap:'12px'}}>
                                    <div className="form-group" style={{flex:1}}>
                                        <label>Priority</label>
                                        <select value={newTask.priority} onChange={e => setNewTask({...newTask, priority: e.target.value})}>
                                            <option value="low">Low</option>
                                            <option value="medium">Medium</option>
                                            <option value="high">High</option>
                                        </select>
                                    </div>
                                    <div className="form-group" style={{flex:1}}>
                                        <label>Due Date</label>
                                        <input type="date" value={newTask.due_date} onChange={e => setNewTask({...newTask, due_date: e.target.value})} />
                                    </div>
                                </div>
                                <div className="modal-buttons">
                                    <button className="btn-secondary" onClick={() => setShowAddTask(false)}>Cancel</button>
                                    <button className="btn-primary" onClick={addTask}>Create Task</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAddNote && (
                        <div className="modal-overlay" onClick={() => setShowAddNote(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2>New Coaching Note</h2>
                                <div className="form-group">
                                    <label>Agent</label>
                                    <select value={newNote.agent_name} onChange={e => setNewNote({...newNote, agent_name: e.target.value})}>
                                        <option value="">Select agent...</option>
                                        {coreAgents.map(a => <option key={a} value={a}>{a}</option>)}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Note</label>
                                    <textarea rows={5} value={newNote.note} onChange={e => setNewNote({...newNote, note: e.target.value})} placeholder="Coaching observations, action items, feedback..." />
                                </div>
                                <div className="modal-buttons">
                                    <button className="btn-secondary" onClick={() => setShowAddNote(false)}>Cancel</button>
                                    <button className="btn-primary" onClick={addNote}>Save Note</button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }


        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
