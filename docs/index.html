<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCT Dashboard - The Corbin Real Estate Team</title>

  <!-- React 18 from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background-color: #0d1117;
      color: #e6edf3;
      line-height: 1.6;
    }

    #root {
      display: flex;
      height: 100vh;
    }

    /* Sidebar Navigation */
    .sidebar {
      width: 280px;
      background-color: #0d1117;
      border-right: 1px solid #21262d;
      padding: 24px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      margin-bottom: 32px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 16px;
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: #58a6ff;
      margin-bottom: 4px;
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: #8b949e;
    }

    .nav-group {
      margin-bottom: 24px;
    }

    .nav-group-label {
      font-size: 11px;
      font-weight: 700;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      padding: 0 12px;
    }

    .nav-item {
      padding: 12px 16px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: #8b949e;
      font-size: 14px;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background-color: #161b22;
      color: #e6edf3;
    }

    .nav-item.active {
      background-color: #161b22;
      color: #58a6ff;
      border-left-color: #58a6ff;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background-color: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      color: #e6edf3;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* Cards */
    .card {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 8px;
    }

    /* Grid Layout */
    .grid {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .grid-4 {
      grid-template-columns: repeat(4, 1fr);
    }

    @media (max-width: 1400px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 900px) {
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* Summary Cards */
    .summary-card {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 20px;
    }

    .summary-label {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 700;
      color: #58a6ff;
      margin-bottom: 12px;
    }

    .summary-sublabel {
      font-size: 12px;
      color: #8b949e;
    }

    /* Progress Bar */
    .progress-container {
      margin-bottom: 16px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 6px;
      color: #8b949e;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background-color: #0d1117;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background-color: #58a6ff;
      transition: width 0.3s ease;
      border-radius: 4px;
    }

    .progress-fill.warning {
      background-color: #d29922;
    }

    .progress-fill.danger {
      background-color: #f85149;
    }

    /* Tables */
    .table-container {
      overflow-x: auto;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background-color: #0d1117;
      border: 1px solid #21262d;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #8b949e;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      border: 1px solid #21262d;
      padding: 12px;
      color: #e6edf3;
    }

    tbody tr:nth-child(even) {
      background-color: #161b22;
    }

    tbody tr:hover {
      background-color: #0d1117;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-blue {
      background-color: rgba(88, 166, 255, 0.1);
      color: #58a6ff;
    }

    .badge-yellow {
      background-color: rgba(210, 153, 34, 0.1);
      color: #d29922;
    }

    .badge-orange {
      background-color: rgba(248, 113, 113, 0.1);
      color: #fb8500;
    }

    .badge-purple {
      background-color: rgba(188, 140, 232, 0.1);
      color: #bc8ce8;
    }

    .badge-green {
      background-color: rgba(63, 185, 80, 0.1);
      color: #3fb950;
    }

    .badge-teal {
      background-color: rgba(79, 195, 247, 0.1);
      color: #4fc3f7;
    }

    .badge-red {
      background-color: rgba(248, 81, 73, 0.1);
      color: #f85149;
    }

    .badge-low {
      background-color: rgba(63, 185, 80, 0.1);
      color: #3fb950;
    }

    .badge-medium {
      background-color: rgba(210, 153, 34, 0.1);
      color: #d29922;
    }

    .badge-high {
      background-color: rgba(248, 81, 73, 0.1);
      color: #f85149;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #21262d;
      background-color: #161b22;
      color: #e6edf3;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn:hover {
      background-color: #0d1117;
      border-color: #58a6ff;
      color: #58a6ff;
    }

    .btn-primary {
      background-color: #58a6ff;
      color: #0d1117;
      border-color: #58a6ff;
    }

    .btn-primary:hover {
      background-color: #79c0ff;
      border-color: #79c0ff;
    }

    .btn-danger {
      background-color: #f85149;
      color: #fff;
      border-color: #f85149;
    }

    .btn-danger:hover {
      background-color: #da3633;
      border-color: #da3633;
    }

    /* Form Elements */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #e6edf3;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #21262d;
      border-radius: 6px;
      background-color: #0d1117;
      color: #e6edf3;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 18px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 16px;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 20px;
    }

    .modal-close:hover {
      color: #e6edf3;
    }

    /* Status */
    .status-success {
      background-color: rgba(63, 185, 80, 0.1);
      color: #3fb950;
      border: 1px solid rgba(63, 185, 80, 0.3);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .status-error {
      background-color: rgba(248, 81, 73, 0.1);
      color: #f85149;
      border: 1px solid rgba(248, 81, 73, 0.3);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .status-info {
      background-color: rgba(88, 166, 255, 0.1);
      color: #58a6ff;
      border: 1px solid rgba(88, 166, 255, 0.3);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #8b949e;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid #21262d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Flex utilities */
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Agent selector buttons */
    .agent-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .agent-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #21262d;
      background-color: #161b22;
      color: #e6edf3;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .agent-btn:hover {
      background-color: #0d1117;
      border-color: #58a6ff;
      color: #58a6ff;
    }

    .agent-btn.active {
      background-color: #58a6ff;
      color: #0d1117;
      border-color: #58a6ff;
    }

    /* Kanban */
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .kanban-column {
      background-color: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 16px;
      min-height: 500px;
    }

    .kanban-column-title {
      font-size: 14px;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #21262d;
    }

    .task-card {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: grab;
    }

    .task-card:hover {
      border-color: #58a6ff;
    }

    .task-card-title {
      font-size: 14px;
      font-weight: 500;
      color: #e6edf3;
      margin-bottom: 8px;
    }

    .task-card-meta {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 8px;
    }

    .task-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .task-card-actions button {
      flex: 1;
      padding: 4px 8px;
      font-size: 11px;
    }

    /* Filters */
    .filter-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
    }

    .filter-group select {
      width: auto;
      max-width: 200px;
    }

    /* Chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      height: 200px;
      gap: 12px;
      padding: 20px 0;
      border-bottom: 1px solid #21262d;
    }

    .bar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .bar {
      width: 100%;
      background-color: #58a6ff;
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      transition: background-color 0.2s;
    }

    .bar:hover {
      background-color: #79c0ff;
    }

    .bar-label {
      font-size: 11px;
      color: #8b949e;
      margin-top: 8px;
      text-align: center;
    }

    .bar-value {
      font-size: 12px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 4px;
    }

    small {
      font-size: 12px;
    }

    /* Text colors */
    .text-success { color: #3fb950; }
    .text-warning { color: #d29922; }
    .text-danger { color: #f85149; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Constants
    const SUPABASE_URL = 'https://idmxupicsrmbujtrgdrf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkbXh1cGljc3JtYnVqdHJnZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzk4MjI2NDUsImV4cCI6MjA1NTM5ODY0NX0.8cF0P1MBLk4SF_MBnAVseF1JjRABJMgJmQhfjumeVYI';

    const TEAM_GOAL = { volume: 20000000, units: 52, gci: 600000, avgPrice: 390000 };
    const AGENTS = [
      { name: 'Addison', volume: 8000000, units: 12, monthlyUnits: 1, quarterlyUnits: 4 },
      { name: 'Ron', volume: 6000000, units: 12, monthlyUnits: 1, quarterlyUnits: 4 },
      { name: 'Will', volume: 5000000, units: 19, monthlyUnits: 2, quarterlyUnits: 6 },
      { name: 'Zach', volume: 3500000, units: 10, monthlyUnits: 1, quarterlyUnits: 4 },
    ];
    const AGENT_NAMES = AGENTS.map(a => a.name);

    // Utility functions
    const formatCurrency = (num) => {
      if (!num) return '$0';
      return '$' + num.toLocaleString('en-US');
    };

    const formatNumber = (num) => {
      if (!num) return '0';
      return num.toLocaleString('en-US');
    };

    const getProgress = (actual, goal) => {
      if (goal === 0) return 0;
      return Math.min((actual / goal) * 100, 100);
    };

    const getProgressColor = (percent) => {
      if (percent >= 90) return '';
      if (percent >= 75) return 'warning';
      return 'danger';
    };

    const getMonday = (date = new Date()) => {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      d.setDate(diff);
      return d.toISOString().split('T')[0];
    };

    // Supabase API calls
    const supabaseCall = async (method, table, data = null, filters = null) => {
      let url = `${SUPABASE_URL}/rest/v1/${table}`;

      if (filters) {
        const params = new URLSearchParams();
        Object.entries(filters).forEach(([key, value]) => {
          params.append(key, value);
        });
        url += '?' + params.toString();
      }

      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
      };

      const options = { method, headers };
      if (data && (method === 'POST' || method === 'PATCH')) {
        options.body = JSON.stringify(data);
      }

      try {
        const response = await fetch(url, options);
        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('Table not found');
          }
          throw new Error(`HTTP ${response.status}`);
        }
        return await response.json();
      } catch (error) {
        console.error(`Supabase error: ${error.message}`);
        throw error;
      }
    };

    // Components
    const SummaryCard = ({ label, value, subLabel }) => (
      <div className="summary-card">
        <div className="summary-label">{label}</div>
        <div className="summary-value">{value}</div>
        {subLabel && <div className="summary-sublabel">{subLabel}</div>}
      </div>
    );

    const Progress = ({ label, actual, goal, showPercent = true }) => {
      const percent = getProgress(actual, goal);
      const color = getProgressColor(percent);
      return (
        <div className="progress-container">
          <div className="progress-label">
            <span>{label}</span>
            {showPercent && <span>{percent.toFixed(0)}%</span>}
          </div>
          <div className="progress-bar">
            <div className={`progress-fill ${color}`} style={{ width: `${percent}%` }}></div>
          </div>
        </div>
      );
    };

    const StatusBadge = ({ status }) => {
      const badges = {
        'new': 'badge-blue', 'contacted': 'badge-yellow', 'showing': 'badge-orange',
        'offer': 'badge-purple', 'under_contract': 'badge-green', 'closed': 'badge-teal',
        'lost': 'badge-red', 'todo': 'badge-blue', 'in_progress': 'badge-yellow', 'done': 'badge-green',
      };
      return <span className={`badge ${badges[status] || 'badge-blue'}`}>{status}</span>;
    };

    const PriorityBadge = ({ priority }) => {
      const badges = { 'low': 'badge-low', 'medium': 'badge-medium', 'high': 'badge-high' };
      return <span className={`badge ${badges[priority] || 'badge-medium'}`}>{priority}</span>;
    };

    // PAGE 1: Dashboard
    const Dashboard = () => {
      const [deals, setDeals] = useState([]);
      const [weeklyReports, setWeeklyReports] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchData = async () => {
          try {
            const dealsData = await supabaseCall('GET', 'deals');
            setDeals(dealsData || []);
          } catch (error) {
            console.error('Failed to load deals:', error);
          }
          try {
            const reportsData = await supabaseCall('GET', 'weekly_reports');
            setWeeklyReports(reportsData || []);
          } catch (error) {
            console.error('Failed to load weekly reports:', error);
          }
          setLoading(false);
        };
        fetchData();
      }, []);

      const ytdStats = useMemo(() => {
        const closed = deals.filter(d => d.status === 'Closed' && d.close_date && new Date(d.close_date).getFullYear() === 2026);
        return {
          volume: closed.reduce((sum, d) => sum + (d.sale_price || 0), 0),
          units: closed.length,
          gci: closed.reduce((sum, d) => sum + (d.gci || 0), 0),
          avgPrice: closed.length > 0 ? closed.reduce((sum, d) => sum + (d.sale_price || 0), 0) / closed.length : 0,
        };
      }, [deals]);

      const agentStats = useMemo(() => {
        const closed = deals.filter(d => d.status === 'Closed' && d.close_date && new Date(d.close_date).getFullYear() === 2026);
        const stats = {};
        AGENT_NAMES.forEach(name => {
          const agentDeals = closed.filter(d => d.agent_name === name);
          stats[name] = {
            volume: agentDeals.reduce((sum, d) => sum + (d.sale_price || 0), 0),
            units: agentDeals.length,
          };
        });
        return stats;
      }, [deals]);

      if (loading) return <div className="loading"><div className="spinner"></div> Loading...</div>;

      return (
        <div>
          <h2 className="header-title">Dashboard</h2>
          <div className="card">
            <h3 className="card-title">YTD Summary</h3>
            <div className="grid grid-4">
              <SummaryCard label="Total Volume" value={formatCurrency(ytdStats.volume)} subLabel={`${AGENT_NAMES.length} agents`} />
              <SummaryCard label="Total Units" value={formatNumber(ytdStats.units)} subLabel="Closed deals" />
              <SummaryCard label="Total GCI" value={formatCurrency(ytdStats.gci)} subLabel="Commission income" />
              <SummaryCard label="Avg Sale Price" value={formatCurrency(ytdStats.avgPrice)} subLabel="Per transaction" />
            </div>
          </div>
          <div className="card">
            <h3 className="card-title">Team Goals Progress</h3>
            <div className="grid grid-2">
              <div>
                <Progress label="Volume" actual={ytdStats.volume} goal={TEAM_GOAL.volume} />
                <Progress label="Units" actual={ytdStats.units} goal={TEAM_GOAL.units} />
              </div>
              <div>
                <Progress label="GCI" actual={ytdStats.gci} goal={TEAM_GOAL.gci} />
              </div>
            </div>
          </div>
          <div className="card">
            <h3 className="card-title">Per-Agent Summary</h3>
            <div className="grid grid-4">
              {AGENTS.map(agent => {
                const stats = agentStats[agent.name] || { volume: 0, units: 0 };
                return (
                  <div key={agent.name} className="summary-card">
                    <div className="summary-label">{agent.name}</div>
                    <div style={{ marginBottom: '12px' }}>

    // PAGE 2: Weekly Report
    const WeeklyReport = () => {
      const [selectedAgent, setSelectedAgent] = useState(AGENT_NAMES[0]);
      const [weekStart, setWeekStart] = useState(getMonday());
      const [formData, setFormData] = useState({
        calls: '', convos: '', new_appts_set: '', appts_met: '', listings_signed: '', bbas: '', contracts_written: '', under_contract: '', closings: ''
      });

      const handleSubmit = async (e) => {
        e.preventDefault();

          setFormData({ calls: '', convos: '', new_appts_set: '', appts_met: '', listings_signed: '', bbas: '', contracts_written: '', under_contract: '', closings: '' });

      const loadRecentReports = async (agent) => {
        try {
          const data = await supabaseCall('GET', 'weekly_reports', null, { agent_name: `eq.${agent}`, order: 'week_start.desc', limit: '4' });
          setRecentReports(data || []);

          console.error('Failed to load reports:', error);

      useEffect(() => {
        loadRecentReports(selectedAgent);

      return (
        <div>
          <h2 className="header-title">Weekly Report</h2>
          <div className="card">
            <h3 className="card-title">Enter Weekly Data</h3>
            <form onSubmit={handleSubmit}>
              <div className="form-group">
                <label>Agent</label>
                <select value={selectedAgent} onChange={(e) => setSelectedAgent(e.target.value)}>
                  {AGENT_NAMES.map(name => <option key={name} value={name}>{name}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Week Starting (Monday)</label>
                <input type="date" value={weekStart} onChange={(e) => setWeekStart(e.target.value)} />
              </div>
              <div className="grid grid-3">
                <div className="form-group"><label>Calls</label><input type="number" name="calls" value={formData.calls} onChange={handleInputChange} min="0" /></div>
                <div className="form-group"><label>Conversations</label><input type="number" name="convos" value={formData.convos} onChange={handleInputChange} min="0" /></div>
                <div className="form-group"><label>Appts Set</label><input type="number" name="new_appts_set" value={formData.new_appts_set} onChange={handleInputChange} min="0" /></div>
                <div className="form-group"><label>Appts Met</label><input type="number" name="appts_met" value={formData.appts_met} onChange={handleInputChange} min="0" /></div>
                <div className="form-group"><label>Listings Signed</label><input type="number" name="listings_signed" value={formData.listings_signed} onChange={handleInputChange} min="0" /></div>
                <div className="form-group"><label>BBAs</label><input type="number" name="bbas" value={formData.bbas} onChange={handleInputChange} min="0" /></div>
                <div className="form-group"><label>Contracts Written</label><input type="number" name="contracts_written" value={formData.contracts_written} onChange={handleInputChange} min="0" /></div>
                <div className="form-group"><label>Under Contract</label><input type="number" name="under_contract" value={formData.under_contract} onChange={handleInputChange} min="0" /></div>
                <div className="form-group"><label>Closings</label><input type="number" name="closings" value={formData.closings} onChange={handleInputChange} min="0" /></div>
              </div>
              <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? 'Saving...' : 'Submit'}</button>

          </div>
          {submitted && <div className="status-success">✓ Report saved for {submitted.agent} ({submitted.week})</div>}
          {recentReports.length > 0 && (

              <h3 className="card-title">Recent Reports - {selectedAgent}</h3>
              <div className="table-container">
                <table>
                  <thead><tr><th>Week</th><th>Calls</th><th>Convos</th><th>Appts Set</th><th>Appts Met</th><th>Listings</th><th>BBAs</th><th>Contracts</th><th>Under Contract</th><th>Closings</th></tr></thead>
                  <tbody>{recentReports.map((r, idx) => <tr key={idx}><td>{r.week_start}</td><td>{r.calls||0}</td><td>{r.convos||0}</td><td>{r.new_appts_set||0}</td><td>{r.appts_met||0}</td><td>{r.listings_signed||0}</td><td>{r.bbas||0}</td><td>{r.contracts_written||0}</td><td>{r.under_contract||0}</td><td>{r.closings||0}</td></tr>)}</tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    };

    // PAGE 3: Goals & Progress
    const GoalsProgress = () => {
      const [selectedAgent, setSelectedAgent] = useState('Team');
      const [deals, setDeals] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchData = async () => {
          try {
            const dealsData = await supabaseCall('GET', 'deals');
            setDeals(dealsData || []);
          } catch (error) {
            console.error('Failed to load deals:', error);
          }
          setLoading(false);
        };
        fetchData();
      }, []);

      const getStats = (agent) => {
        const isTeam = agent === 'Team';
        const closed = deals.filter(d => {
          const isClosed = d.status === 'Closed' && d.close_date && new Date(d.close_date).getFullYear() === 2026;
          if (isTeam) return isClosed;
          return isClosed && d.agent_name === agent;
        });

        const byMonth = {};
        closed.forEach(deal => {
          const month = new Date(deal.close_date).getMonth() + 1;
          if (!byMonth[month]) byMonth[month] = { units: 0, volume: 0 };
          byMonth[month].units += 1;
          byMonth[month].volume += deal.sale_price || 0;
        });

        const goal = isTeam ? TEAM_GOAL : AGENTS.find(a => a.name === agent);
        const ytdVolume = closed.reduce((sum, d) => sum + (d.sale_price || 0), 0);
        const ytdUnits = closed.length;

        return { byMonth, goal, ytdVolume, ytdUnits };
      };

      const stats = getStats(selectedAgent);
      const monthLabels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

      if (loading) return <div className="loading"><div className="spinner"></div> Loading...</div>;

      return (
        <div>

          <div className="agent-buttons">
            <button className={`agent-btn ${selectedAgent === 'Team' ? 'active' : ''}`} onClick={() => setSelectedAgent('Team')}>Team</button>

              <SummaryCard label="YTD Units" value={formatNumber(stats.ytdUnits)} subLabel={`vs ${stats.goal.units}`} />
              <SummaryCard label="Avg Price" value={formatCurrency(stats.ytdVolume / (stats.ytdUnits || 1))} subLabel="Per transaction" />
            </div>
          </div>
          <div className="card">
            <h3 className="card-title">Progress to Goals</h3>
            <div className="grid grid-2">
              <div><Progress label="Volume Progress" actual={stats.ytdVolume} goal={stats.goal.volume} /></div>
              <div><Progress label="Units Progress" actual={stats.ytdUnits} goal={stats.goal.units} /></div>
            </div>
          </div>
          <div className="card">
            <h3 className="card-title">Monthly Breakdown</h3>
            <div className="table-container">
              <table>
                <thead><tr><th>Month</th><th>Units</th><th>Volume</th><th>Avg Price</th></tr></thead>
                <tbody>{monthLabels.map((month, idx) => {
                  const monthData = stats.byMonth[idx + 1] || { units: 0, volume: 0 };
                  return <tr key={month}><td>{month}</td><td>{monthData.units}</td><td>{formatCurrency(monthData.volume)}</td><td>{formatCurrency(monthData.volume / (monthData.units || 1))}</td></tr>;
                })}</tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    // PAGE 4: Pipeline
    const Pipeline = () => {
      const [pipeline, setPipeline] = useState([]);
      const [filteredPipeline, setFilteredPipeline] = useState([]);
      const [selectedAgent, setSelectedAgent] = useState('All');

      const [showModal, setShowModal] = useState(false);
      const [loading, setLoading] = useState(true);
      const [formData, setFormData] = useState({
        lead_name: '', agent_name: '', source: '', type: '', status: 'new', price: '', gci: '', showings: '', timeframe: '', notes: ''
      });

      useEffect(() => {
        loadPipeline();
      }, []);

      const loadPipeline = async () => {
        try {
          const data = await supabaseCall('GET', 'pipeline');
          setPipeline(data || []);
        } catch (error) {
          console.error('Failed to load pipeline:', error);
        }
        setLoading(false);
      };

      useEffect(() => {
        let filtered = pipeline;
        if (selectedAgent !== 'All') filtered = filtered.filter(p => p.agent_name === selectedAgent);
        if (selectedStatus !== 'All') filtered = filtered.filter(p => p.status === selectedStatus);
        setFilteredPipeline(filtered);
      }, [pipeline, selectedAgent, selectedStatus]);

      const handleFormChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleAddLead = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          await supabaseCall('POST', 'pipeline', {
            lead_name: formData.lead_name, agent_name: formData.agent_name,
            source: formData.source, type: formData.type, status: formData.status,
            price: parseInt(formData.price) || 0, gci: parseInt(formData.gci) || 0,

            notes: formData.notes, created_at: new Date().toISOString(), updated_at: new Date().toISOString(),

          setShowModal(false);

          await loadPipeline();

        }

      if (loading) return <div className="loading"><div className="spinner"></div> Loading...</div>;

      return (
        <div>
          <h2 className="header-title">Pipeline</h2>

            <div className="flex-between" style={{ marginBottom: '20px' }}>
              <div className="filter-group" style={{ margin: 0 }}>
                <label>Agent:</label>
                <select value={selectedAgent} onChange={(e) => setSelectedAgent(e.target.value)} style={{ width: 'auto' }}>

                </select>
                <label>Status:</label>
                <select value={selectedStatus} onChange={(e) => setSelectedStatus(e.target.value)} style={{ width: 'auto' }}>
                  <option>All</option><option>new</option><option>contacted</option><option>showing</option>
                  <option>offer</option><option>under_contract</option><option>closed</option><option>lost</option>
                </select>
              </div>
              <button className="btn btn-primary" onClick={() => setShowModal(true)}>+ Add Lead</button>
            </div>
            <div className="table-container">
              <table>
                <thead><tr><th>Lead Name</th><th>Agent</th><th>Source</th><th>Type</th><th>Status</th><th>Price</th><th>GCI</th><th>Showings</th><th>Timeframe</th><th>Notes</th></tr></thead>
                <tbody>{filteredPipeline.map((lead, idx) => (
                  <tr key={idx}>
                    <td>{lead.lead_name}</td><td>{lead.agent_name}</td><td>{lead.source}</td><td>{lead.type}</td>
                    <td><StatusBadge status={lead.status} /></td><td>{formatCurrency(lead.price)}</td>
                    <td>{formatCurrency(lead.gci)}</td><td>{lead.showings || 0}</td><td>{lead.timeframe}</td><td>{lead.notes}</td>

                <form onSubmit={handleAddLead}>
                  <div className="form-group"><label>Lead Name *</label><input type="text" name="lead_name" value={formData.lead_name} onChange={handleFormChange} required /></div>
                  <div className="form-group"><label>Agent *</label><select name="agent_name" value={formData.agent_name} onChange={handleFormChange} required><option value="">Select</option>{AGENT_NAMES.map(n => <option key={n} value={n}>{n}</option>)}</select></div>
                  <div className="form-group"><label>Source</label><input type="text" name="source" value={formData.source} onChange={handleFormChange} /></div>

                  <div className="form-group"><label>Status</label><select name="status" value={formData.status} onChange={handleFormChange}><option value="new">New</option><option value="contacted">Contacted</option><option value="showing">Showing</option><option value="offer">Offer</option><option value="under_contract">Under Contract</option><option value="closed">Closed</option><option value="lost">Lost</option></select></div>
                  <div className="grid grid-2">
                    <div className="form-group"><label>Price</label><input type="number" name="price" value={formData.price} onChange={handleFormChange} /></div>
                    <div className="form-group"><label>GCI</label><input type="number" name="gci" value={formData.gci} onChange={handleFormChange} /></div>
                  </div>
                  <div className="grid grid-2">
                    <div className="form-group"><label>Showings</label><input type="number" name="showings" value={formData.showings} onChange={handleFormChange} min="0" /></div>
                    <div className="form-group"><label>Timeframe</label><input type="text" name="timeframe" value={formData.timeframe} onChange={handleFormChange} /></div>
                  </div>
                  <div className="form-group"><label>Notes</label><textarea name="notes" value={formData.notes} onChange={handleFormChange}></textarea></div>
                  <button type="submit" className="btn btn-primary">Add Lead</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    // PAGE 5: Scorecards & Ratios
    const Scorecards = () => {
      const [deals, setDeals] = useState([]);
      const [weeklyReports, setWeeklyReports] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchData = async () => {
          try {
            setDeals(await supabaseCall('GET', 'deals') || []);
          } catch (error) {
            console.error('Failed to load deals:', error);
          }
          try {
            setWeeklyReports(await supabaseCall('GET', 'weekly_reports') || []);
          } catch (error) {
            console.error('Failed to load reports:', error);
          }
          setLoading(false);
        };
        fetchData();
      }, []);

      const getAgentStats = (agentName) => {
        const agentDeals = deals.filter(d => d.agent_name === agentName && d.status === 'Closed' && d.close_date && new Date(d.close_date).getFullYear() === 2026);
        const agentReports = weeklyReports.filter(r => r.agent_name === agentName);
        const volume = agentDeals.reduce((sum, d) => sum + (d.sale_price || 0), 0);
        const units = agentDeals.length;
        const avgPrice = units > 0 ? volume / units : 0;
        const totalCalls = agentReports.reduce((sum, r) => sum + (r.calls || 0), 0);
        const totalConvos = agentReports.reduce((sum, r) => sum + (r.convos || 0), 0);
        const totalApptsSet = agentReports.reduce((sum, r) => sum + (r.new_appts_set || 0), 0);
        const totalApptsMetc = agentReports.reduce((sum, r) => sum + (r.appts_met || 0), 0);
        const totalContracts = agentReports.reduce((sum, r) => sum + (r.contracts_written || 0), 0);
        const totalClosings = agentReports.reduce((sum, r) => sum + (r.closings || 0), 0);

        return {
          volume, units, avgPrice,
          callsToConvos: totalCalls > 0 ? (totalConvos / totalCalls * 100).toFixed(1) : 0,
          convosToAppts: totalConvos > 0 ? (totalApptsSet / totalConvos * 100).toFixed(1) : 0,
          apptsToContracts: totalApptsMetc > 0 ? (totalContracts / totalApptsMetc * 100).toFixed(1) : 0,
          contractsToClosings: totalContracts > 0 ? (totalClosings / totalContracts * 100).toFixed(1) : 0,
        };
      };

      const agentStats = {};
      AGENT_NAMES.forEach(name => {
        agentStats[name] = getAgentStats(name);
      });

      const leaderboard = AGENT_NAMES.sort((a, b) => agentStats[b].volume - agentStats[a].volume);

      if (loading) return <div className="loading"><div className="spinner"></div> Loading...</div>;

      return (
        <div>
          <h2 className="header-title">Scorecards & Ratios</h2>
          <div className="grid grid-2">
            {AGENT_NAMES.map(name => {
              const stats = agentStats[name];
              const goal = AGENTS.find(a => a.name === name);
              return (
                <div key={name} className="card">
                  <h3 className="card-title">{name}</h3>
                  <div style={{ marginBottom: '16px' }}>
                    <div className="summary-label">YTD Volume</div>
                    <div className="summary-value" style={{ fontSize: '20px', marginBottom: '4px' }}>{formatCurrency(stats.volume)}</div>
                    <div className="summary-sublabel" style={{ marginBottom: '12px' }}>Goal: {formatCurrency(goal.volume)}</div>
                    <Progress label="Volume" actual={stats.volume} goal={goal.volume} />
                  </div>
                  <div style={{ marginBottom: '16px' }}>
                    <div className="summary-label">YTD Units</div>
                    <div className="summary-value" style={{ fontSize: '20px', marginBottom: '4px' }}>{stats.units}</div>
                    <div className="summary-sublabel" style={{ marginBottom: '12px' }}>Goal: {goal.units}</div>
                    <Progress label="Units" actual={stats.units} goal={goal.units} />
                  </div>
                  <div style={{ borderTop: '1px solid #21262d', paddingTop: '12px' }}>
                    <div className="summary-label">Conversion Ratios</div>
                    <div style={{ fontSize: '12px', color: '#8b949e', lineHeight: '1.8' }}>
                      <div>Calls → Convos: <strong style={{ color: '#e6edf3' }}>{stats.callsToConvos}%</strong></div>
                      <div>Convos → Appts: <strong style={{ color: '#e6edf3' }}>{stats.convosToAppts}%</strong></div>
                      <div>Appts → Contracts: <strong style={{ color: '#e6edf3' }}>{stats.apptsToContracts}%</strong></div>
                      <div>Contracts → Closings: <strong style={{ color: '#e6edf3' }}>{stats.contractsToClosings}%</strong></div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="card">
            <h3 className="card-title">Volume Leaderboard</h3>
            <div className="table-container">
              <table>
                <thead><tr><th>Rank</th><th>Agent</th><th>YTD Volume</th><th>YTD Units</th><th>Avg Price</th><th>Goal Volume</th><th>% to Goal</th></tr></thead>
                <tbody>{leaderboard.map((name, idx) => {
                  const stats = agentStats[name];
                  const goal = AGENTS.find(a => a.name === name);
                  const pctToGoal = (stats.volume / goal.volume * 100).toFixed(0);
                  return (
                    <tr key={name}>
                      <td>{idx + 1}</td><td>{name}</td><td>{formatCurrency(stats.volume)}</td>
                      <td>{stats.units}</td><td>{formatCurrency(stats.avgPrice)}</td><td>{formatCurrency(goal.volume)}</td>
                      <td><span className={pctToGoal >= 90 ? 'text-success' : pctToGoal >= 75 ? 'text-warning' : 'text-danger'}>{pctToGoal}%</span></td>
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    // PAGE 6: Call Data
    const CallData = () => {
      const [apiKey, setApiKey] = useState(localStorage.getItem('fub_api_key') || '');
      const [dateRange, setDateRange] = useState('week');
      const [callData, setCallData] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      const handleApiKeySave = () => {
        localStorage.setItem('fub_api_key', apiKey);
        alert('API key saved locally');
      };

      const fetchCalls = async () => {
        if (!apiKey) {
          setError('Please enter a FUB API key');
          return;
        }
        setLoading(true);
        setError(null);
        try {
          const auth = btoa(apiKey + ':');
          const response = await fetch('https://api.followupboss.com/v1/events?type=call&limit=100', {
            headers: { 'Authorization': 'Basic ' + auth }
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          const data = await response.json();
          setCallData(data.results || []);
        } catch (err) {
          setError(`Failed to fetch calls: ${err.message}`);
        }
        setLoading(false);
      };

      const getDateRangeFilter = () => {
        const now = new Date();
        let from;
        if (dateRange === 'week') {
          from = new Date(now);
          from.setDate(from.getDate() - 7);
        } else if (dateRange === 'month') {
          from = new Date(now);
          from.setMonth(from.getMonth() - 1);
        } else {
          from = new Date(now);
          from.setFullYear(from.getFullYear() - 1);
        }
        return from;
      };

      const filteredCalls = callData.filter(call => {
        const callDate = new Date(call.timestamp);
        return callDate >= getDateRangeFilter();
      });

      const callsByAgent = {};
      filteredCalls.forEach(call => {
        const agent = call.person?.name || 'Unknown';
        if (!callsByAgent[agent]) callsByAgent[agent] = 0;
        callsByAgent[agent]++;
      });

      return (
        <div>
          <h2 className="header-title">Call Data (Follow Up Boss)</h2>
          <div className="card">
            <h3 className="card-title">FUB API Configuration</h3>
            <div className="form-group">
              <label>FUB API Key</label>
              <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="Enter your API key" />
              <small style={{ color: '#8b949e', marginTop: '8px' }}>Get your key at: app.followupboss.com/account/settings/api</small>
            </div>
            <button className="btn btn-primary" onClick={handleApiKeySave}>Save API Key</button>
          </div>
          <div className="card">
            <h3 className="card-title">Call Data</h3>
            <div style={{ marginBottom: '16px' }}>
              <label style={{ marginRight: '12px' }}>Date Range:</label>
              <select value={dateRange} onChange={(e) => setDateRange(e.target.value)} style={{ width: 'auto' }}>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
                <option value="year">This Year</option>
              </select>
            </div>
            <button className="btn btn-primary" onClick={fetchCalls} disabled={loading || !apiKey}>{loading ? 'Loading...' : 'Fetch Calls'}</button>
            {error && <div className="status-error" style={{ marginTop: '16px' }}>{error}</div>}
          </div>
          {filteredCalls.length > 0 && (
            <>
              <div className="card">
                <h3 className="card-title">Summary</h3>
                <div className="grid grid-2">
                  <SummaryCard label="Total Calls" value={formatNumber(filteredCalls.length)} subLabel={dateRange} />
                  <SummaryCard label="Agents" value={formatNumber(Object.keys(callsByAgent).length)} subLabel="Making calls" />
                </div>
              </div>
              <div className="card">
                <h3 className="card-title">Calls by Agent</h3>
                <div className="table-container">
                  <table>
                    <thead><tr><th>Agent</th><th>Calls</th><th>Avg/Day</th></tr></thead>
                    <tbody>{Object.entries(callsByAgent).sort((a, b) => b[1] - a[1]).map(([agent, count]) => (
                      <tr key={agent}><td>{agent}</td><td>{count}</td><td>{(count / 7).toFixed(1)}</td></tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            </>
          )}
        </div>
      );
    };

    // PAGE 7: Tasks
    const Tasks = () => {
      const [tasks, setTasks] = useState([]);
      const [filteredTasks, setFilteredTasks] = useState([]);
      const [selectedAgent, setSelectedAgent] = useState('All');
      const [showModal, setShowModal] = useState(false);
      const [loading, setLoading] = useState(true);
      const [formData, setFormData] = useState({
        title: '', description: '', assigned_to: '', priority: 'medium', due_date: '', status: 'todo'
      });

      useEffect(() => {
        loadTasks();
      }, []);

      const loadTasks = async () => {
        try {
          setTasks(await supabaseCall('GET', 'tasks') || []);
        } catch (error) {
          console.error('Failed to load tasks:', error);
        }
        setLoading(false);
      };

      useEffect(() => {
        let filtered = tasks;
        if (selectedAgent !== 'All') {
          filtered = filtered.filter(t => t.assigned_to === selectedAgent);
        }
        setFilteredTasks(filtered);
      }, [tasks, selectedAgent]);

      const handleFormChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleAddTask = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          await supabaseCall('POST', 'tasks', {
            title: formData.title, description: formData.description,
            assigned_to: formData.assigned_to || null, created_by: 'User',
            status: formData.status, priority: formData.priority,
            due_date: formData.due_date || null, created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
          });
          setShowModal(false);
          setFormData({ title: '', description: '', assigned_to: '', priority: 'medium', due_date: '', status: 'todo' });
          await loadTasks();
        } catch (error) {
          alert('Error adding task: ' + error.message);
        }
        setLoading(false);
      };

      const handleStatusChange = async (taskId, newStatus) => {
        try {
          await supabaseCall('PATCH', 'tasks?id=eq.' + taskId, { status: newStatus });
          await loadTasks();
        } catch (error) {
          alert('Error updating task: ' + error.message);
        }
      };

      const handleDeleteTask = async (taskId) => {
        if (!confirm('Delete this task?')) return;
        try {
          await supabaseCall('DELETE', 'tasks?id=eq.' + taskId);
          await loadTasks();
        } catch (error) {
          alert('Error deleting task: ' + error.message);
        }
      };

      const todoTasks = filteredTasks.filter(t => t.status === 'todo');
      const inProgressTasks = filteredTasks.filter(t => t.status === 'in_progress');
      const doneTasks = filteredTasks.filter(t => t.status === 'done');

      if (loading) return <div className="loading"><div className="spinner"></div> Loading...</div>;

      return (
        <div>
          <h2 className="header-title">Tasks</h2>
          <div className="card">
            <div className="flex-between" style={{ marginBottom: '20px' }}>
              <div className="filter-group" style={{ margin: 0 }}>
                <label>Assigned to:</label>
                <select value={selectedAgent} onChange={(e) => setSelectedAgent(e.target.value)} style={{ width: 'auto' }}>
                  <option>All</option>
                  {AGENT_NAMES.map(name => <option key={name} value={name}>{name}</option>)}
                </select>
              </div>
              <button className="btn btn-primary" onClick={() => setShowModal(true)}>+ Add Task</button>
            </div>
          </div>
          <div className="kanban-board">
            <div className="kanban-column">
              <div className="kanban-column-title">To Do ({todoTasks.length})</div>
              {todoTasks.map(task => (
                <div key={task.id} className="task-card">
                  <div className="task-card-title">{task.title}</div>
                  {task.assigned_to && <div className="task-card-meta">Assigned: {task.assigned_to}</div>}
                  {task.due_date && <div className="task-card-meta">Due: {task.due_date}</div>}
                  <div className="task-card-meta"><PriorityBadge priority={task.priority} /></div>
                  <div className="task-card-actions">
                    <button className="btn" onClick={() => handleStatusChange(task.id, 'in_progress')}>→ Progress</button>
                    <button className="btn btn-danger" onClick={() => handleDeleteTask(task.id)}>Delete</button>
                  </div>
                </div>
              ))}
            </div>
            <div className="kanban-column">
              <div className="kanban-column-title">In Progress ({inProgressTasks.length})</div>
              {inProgressTasks.map(task => (
                <div key={task.id} className="task-card">
                  <div className="task-card-title">{task.title}</div>
                  {task.assigned_to && <div className="task-card-meta">Assigned: {task.assigned_to}</div>}
                  {task.due_date && <div className="task-card-meta">Due: {task.due_date}</div>}
                  <div className="task-card-meta"><PriorityBadge priority={task.priority} /></div>
                  <div className="task-card-actions">
                    <button className="btn" onClick={() => handleStatusChange(task.id, 'todo')}>← To Do</button>
                    <button className="btn" onClick={() => handleStatusChange(task.id, 'done')}>→ Done</button>
                  </div>
                </div>
              ))}
            </div>
            <div className="kanban-column">
              <div className="kanban-column-title">Done ({doneTasks.length})</div>
              {doneTasks.map(task => (
                <div key={task.id} className="task-card">
                  <div className="task-card-title">{task.title}</div>
                  {task.assigned_to && <div className="task-card-meta">Assigned: {task.assigned_to}</div>}
                  {task.due_date && <div className="task-card-meta">Due: {task.due_date}</div>}
                  <div className="task-card-meta"><PriorityBadge priority={task.priority} /></div>
                  <div className="task-card-actions">
                    <button className="btn" onClick={() => handleStatusChange(task.id, 'in_progress')}>← Progress</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
          {showModal && (
            <div className="modal-overlay" onClick={() => setShowModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">Add Task</div>
                <button className="modal-close" onClick={() => setShowModal(false)}>×</button>
                <form onSubmit={handleAddTask}>
                  <div className="form-group"><label>Task Title *</label><input type="text" name="title" value={formData.title} onChange={handleFormChange} required /></div>
                  <div className="form-group"><label>Description</label><textarea name="description" value={formData.description} onChange={handleFormChange}></textarea></div>
                  <div className="form-group"><label>Assign to</label><select name="assigned_to" value={formData.assigned_to} onChange={handleFormChange}><option value="">Unassigned</option>{AGENT_NAMES.map(n => <option key={n} value={n}>{n}</option>)}</select></div>
                  <div className="grid grid-2">
                    <div className="form-group"><label>Priority</label><select name="priority" value={formData.priority} onChange={handleFormChange}><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
                    <div className="form-group"><label>Due Date</label><input type="date" name="due_date" value={formData.due_date} onChange={handleFormChange} /></div>
                  </div>
                  <button type="submit" className="btn btn-primary">Add Task</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    // PAGE 8: Trends
    const Trends = () => {
      const [deals, setDeals] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchData = async () => {
          try {
            setDeals(await supabaseCall('GET', 'deals') || []);
          } catch (error) {
            console.error('Failed to load deals:', error);
          }
          setLoading(false);
        };
        fetchData();
      }, []);

      const monthLabels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const closed2026 = deals.filter(d => d.status === 'Closed' && d.close_date && new Date(d.close_date).getFullYear() === 2026);

      const volumeByMonth = {}, unitsByMonth = {};
      monthLabels.forEach((_, idx) => {
        volumeByMonth[idx + 1] = 0;
        unitsByMonth[idx + 1] = 0;
      });

      closed2026.forEach(deal => {
        const month = new Date(deal.close_date).getMonth() + 1;
        volumeByMonth[month] += deal.sale_price || 0;
        unitsByMonth[month] += 1;
      });

      const maxVolume = Math.max(...Object.values(volumeByMonth), 1);
      const maxUnits = Math.max(...Object.values(unitsByMonth), 1);

      if (loading) return <div className="loading"><div className="spinner"></div> Loading...</div>;

      return (
        <div>
          <h2 className="header-title">Trends</h2>
          <div className="card">
            <h3 className="card-title">2026 Monthly Volume Trend</h3>
            <div className="bar-chart">
              {monthLabels.map((month, idx) => {
                const volume = volumeByMonth[idx + 1] || 0;
                const height = (volume / maxVolume) * 100 || 5;
                return (
                  <div key={month} className="bar-item">
                    <div className="bar-value">{formatCurrency(volume).replace('$', '')}</div>
                    <div className="bar" style={{ height: `${height}%` }}></div>
                    <div className="bar-label">{month}</div>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="card">
            <h3 className="card-title">2026 Monthly Units Trend</h3>
            <div className="bar-chart">
              {monthLabels.map((month, idx) => {
                const units = unitsByMonth[idx + 1] || 0;
                const height = (units / maxUnits) * 100 || 5;
                return (
                  <div key={month} className="bar-item">
                    <div className="bar-value">{units}</div>
                    <div className="bar" style={{ height: `${height}%` }}></div>
                    <div className="bar-label">{month}</div>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="card">
            <h3 className="card-title">Monthly Summary</h3>
            <div className="table-container">
              <table>
                <thead><tr><th>Month</th><th>Volume</th><th>Units</th><th>Avg Price</th></tr></thead>
                <tbody>{monthLabels.map((month, idx) => {
                  const volume = volumeByMonth[idx + 1] || 0;
                  const units = unitsByMonth[idx + 1] || 0;
                  const avg = units > 0 ? volume / units : 0;
                  return <tr key={month}><td>{month}</td><td>{formatCurrency(volume)}</td><td>{units}</td><td>{formatCurrency(avg)}</td></tr>;
                })}</tbody>
              </table>
            </div>
          </div>
          <div className="card">
            <h3 className="card-title">Per-Agent Volume Comparison</h3>
            <div className="table-container">
              <table>
                <thead><tr><th>Agent</th><th>YTD Volume</th><th>YTD Units</th><th>% of Team</th></tr></thead>
                <tbody>{AGENT_NAMES.map(name => {
                  const agentDeals = closed2026.filter(d => d.agent_name === name);
                  const volume = agentDeals.reduce((sum, d) => sum + (d.sale_price || 0), 0);
                  const units = agentDeals.length;
                  const totalVolume = closed2026.reduce((sum, d) => sum + (d.sale_price || 0), 0);
                  const pct = totalVolume > 0 ? (volume / totalVolume * 100).toFixed(1) : 0;
                  return <tr key={name}><td>{name}</td><td>{formatCurrency(volume)}</td><td>{units}</td><td>{pct}%</td></tr>;
                })}</tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    // Main App
    const App = () => {
      const [currentPage, setCurrentPage] = useState('dashboard');

      const pages = {
        dashboard: { name: 'Dashboard', component: Dashboard },
        weeklyReport: { name: 'Weekly Report', component: WeeklyReport },
        goalsProgress: { name: 'Goals & Progress', component: GoalsProgress },
        pipeline: { name: 'Pipeline', component: Pipeline },
        scorecards: { name: 'Scorecards & Ratios', component: Scorecards },
        callData: { name: 'Call Data', component: CallData },
        tasks: { name: 'Tasks', component: Tasks },
        trends: { name: 'Trends', component: Trends },
      };

      const CurrentPageComponent = pages[currentPage].component;

      return (
        <>
          <nav className="sidebar">
            <div className="sidebar-header">
              <div className="sidebar-title">TCT Dashboard</div>
              <div className="sidebar-subtitle">The Corbin Real Estate Team</div>
            </div>
            <div className="nav-group">
              <div className="nav-group-label">OVERVIEW</div>
              <div className={`nav-item ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>Dashboard</div>
            </div>
            <div className="nav-group">
              <div className="nav-group-label">AGENT TOOLS</div>
              <div className={`nav-item ${currentPage === 'weeklyReport' ? 'active' : ''}`} onClick={() => setCurrentPage('weeklyReport')}>Weekly Report</div>
              <div className={`nav-item ${currentPage === 'goalsProgress' ? 'active' : ''}`} onClick={() => setCurrentPage('goalsProgress')}>Goals & Progress</div>
              <div className={`nav-item ${currentPage === 'pipeline' ? 'active' : ''}`} onClick={() => setCurrentPage('pipeline')}>Pipeline</div>
            </div>
            <div className="nav-group">
              <div className="nav-group-label">ANALYTICS</div>
              <div className={`nav-item ${currentPage === 'scorecards' ? 'active' : ''}`} onClick={() => setCurrentPage('scorecards')}>Scorecards & Ratios</div>
              <div className={`nav-item ${currentPage === 'callData' ? 'active' : ''}`} onClick={() => setCurrentPage('callData')}>Call Data (FUB)</div>
              <div className={`nav-item ${currentPage === 'trends' ? 'active' : ''}`} onClick={() => setCurrentPage('trends')}>Trends</div>
            </div>
            <div className="nav-group">
              <div className="nav-group-label">MANAGEMENT</div>
              <div className={`nav-item ${currentPage === 'tasks' ? 'active' : ''}`} onClick={() => setCurrentPage('tasks')}>Tasks</div>
            </div>
          </nav>
          <div className="main-content">
            <div className="header">
              <div className="header-title">{pages[currentPage].name}</div>
            </div>
            <div className="content-area">
              <CurrentPageComponent />
            </div>
          </div>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
