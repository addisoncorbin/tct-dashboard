<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCT Team Command Center</title>

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0f1117;
            color: #e6edf3;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 10px;
        }

        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #8b949e;
        }

        .sidebar-nav {
            flex: 1;
        }

        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            font-size: 14px;
        }

        .nav-item:hover {
            background: #0d1117;
        }

        .nav-item.active {
            background: #0d1117;
            border-left-color: #58a6ff;
            color: #58a6ff;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #30363d;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #2ea043;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            background: #0d1117;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 600;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0f1117;
        }

        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-box p {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #0d1117;
            color: #e6edf3;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .form-group input::placeholder {

        }

        .login-btn,

        .btn-secondary {

            color: white;

            font-weight: 600;

        .btn-secondary:hover {

        }

        }

        .table-container {

        .table-header {

        }

        .table-header h3 {

        }

        .filter-controls {

        .filter-controls select {

            color: #e6edf3;

        thead {

            border-bottom: 1px solid #30363d;

        th {

        td {

        .table-scrollable {

        .modal-overlay {

            right: 0;
            bottom: 0;

        .modal {

            padding: 24px;
            max-width: 600px;
            width: 90%;

        .modal h2 {

        .trending-container {

        .trending-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;

        .trending-card h4 {

        .trending-comparison {

            align-items: flex-end;
            gap: 8px;

        .trending-year {

        }

        .trending-year-label {
            font-size: 11px;
            color: #6e7681;

        .trending-year-value {
            font-size: 16px;

        .progress-bar {

        .progress-fill {

        .agent-breakdown {

        .agent-card {

            padding: 16px;

        .agent-card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e6edf3;
        }

        .agent-metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .agent-metric-label {
            color: #8b949e;
        }

        .agent-metric-values {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .metric-year {
            text-align: right;
            min-width: 80px;
        }

        .metric-year-label {
            font-size: 10px;
            color: #6e7681;
            display: block;
        }

        .metric-year-value {
            font-size: 13px;
            font-weight: 600;
            color: #58a6ff;
        }

        .metric-change {
            font-size: 12px;
            font-weight: 600;
            min-width: 50px;
            text-align: right;
        }

        .metric-change.positive {
            color: #3fb950;
        }

        .metric-change.negative {
            color: #f85149;
        }

        .metric-change.neutral {
            color: #8b949e;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }

        .spinner {
            border: 2px solid #30363d;
            border-top: 2px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }

        .empty-state h3 {
            margin-bottom: 8px;
            color: #e6edf3;
        }

        .security-info {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #8b949e;
        }

        .security-info strong {
            color: #e6edf3;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createClient } = supabase;

        // Supabase Configuration
        const SUPABASE_URL = 'https://idmxupicsrmbujtrgdrf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkbXh1cGljc3JtYnVqdHJnZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzI5MzAsImV4cCI6MjA5MDIwODkzMH0.0CKwkwS7gmaY8s60bG8ekPaBdFWXFocil8UCaiAa1go';

        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            useEffect(() => {
                // Check if user is logged in
                checkAuth();
            }, []);

            async function checkAuth() {
                try {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session?.user) {
                        setUser(session.user);
                    }
                } catch (error) {
                    console.error('Auth check error:', error);
                } finally {
                    setLoading(false);
                }
            }

            async function handleLogin(e) {
                e.preventDefault();
                setLoginError('');

                // Basic validation
                if (!email || !password) {
                    setLoginError('Please enter both email and password');
                    return;
                }

                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    setLoginError('Please enter a valid email address');
                    return;
                }

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email.trim(),
                        password
                    });

                    if (error) throw error;
                    if (data.user) {
                        setUser(data.user);
                        setEmail('');
                        setPassword('');
                    }
                } catch (error) {
                    setLoginError(error.message || 'Login failed. Please check your credentials.');
                    console.error('Login error:', error);
                }
            }

            async function handleLogout() {
                try {
                    await supabaseClient.auth.signOut();
                    setUser(null);
                    setCurrentPage('dashboard');
                } catch (error) {
                    console.error('Logout error:', error);
                }
            }

            if (loading) {
                return (
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: '#0f1117' }}>
                        <div style={{ textAlign: 'center' }}>
                            <div className="spinner"></div>
                            <p style={{ color: '#8b949e' }}>Loading...</p>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return <LoginPage onLogin={handleLogin} email={email} setEmail={setEmail} password={password} setPassword={setPassword} error={loginError} />;
            }

            return (
                <AppLayout
                    user={user}
                    onLogout={handleLogout}
                    currentPage={currentPage}
                    setCurrentPage={setCurrentPage}
                />
            );
        }

        // Login Page
        function LoginPage({ onLogin, email, setEmail, password, setPassword, error }) {
            return (
                <div className="login-container">
                    <div className="login-box">
                        <h1>TCT Dashboard</h1>
                        <p>Team Command Center for Real Estate</p>
                        <form onSubmit={onLogin}>
                            <div className="form-group">
                                <label>Email</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    placeholder="your@email.com"
                                />
                            </div>
                            <div className="form-group">
                                <label>Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢"
                                />
                            </div>
                            {error && <div className="error-message">{error}</div>}
                            <button type="submit" className="login-btn" style={{ marginTop: '16px' }}>Sign In</button>
                        </form>
                        <p style={{ marginTop: '16px', fontSize: '12px', color: '#6e7681', textAlign: 'center' }}>
                            TCT Team Only - Contact Admin for Access
                        </p>
                    </div>
                </div>
            );
        }

        // App Layout
        function AppLayout({ user, onLogout, currentPage, setCurrentPage }) {
            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div className="sidebar-header">
                            <h1>TCT Dashboard</h1>
                            <p>Real Estate Team</p>
                        </div>
                        <div className="sidebar-nav">
                            <div
                                className={`nav-item ${currentPage === 'dashboard' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('dashboard')}
                            >
                                Dashboard
                            </div>
                            <div
                                className={`nav-item ${currentPage === 'deals' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('deals')}
                            >
                                Deals
                            </div>
                            <div
                                className={`nav-item ${currentPage === 'trending' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('trending')}
                            >
                                Trending (YoY)
                            </div>
                        </div>
                        <div className="sidebar-footer">
                            <p style={{ fontSize: '12px', marginBottom: '8px' }}>Logged in as:</p>
                            <p style={{ fontSize: '12px', color: '#58a6ff', marginBottom: '12px' }}>{user.email}</p>
                            <button className="logout-btn" onClick={onLogout}>Logout</button>
                        </div>
                    </div>
                    <div className="main-content">
                        {currentPage === 'dashboard' && <DashboardPage />}
                        {currentPage === 'deals' && <DealsPage />}
                        {currentPage === 'trending' && <TrendingPage />}
                    </div>
                </div>
            );
        }

        // Dashboard Page
        function DashboardPage() {
            const [stats, setStats] = useState({ totalVolume: 0, totalDeals: 0, totalGCI: 0 });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadStats();
            }, []);

            async function loadStats() {
                try {
                    const { data, error } = await supabaseClient
                        .from('deals')
                        .select('sale_price, gross_commission');

                    if (error) throw error;

                    const totalVolume = data.reduce((sum, deal) => sum + (deal.sale_price || 0), 0);
                    const totalGCI = data.reduce((sum, deal) => sum + (deal.gross_commission || 0), 0);

                    setStats({
                        totalVolume,
                        totalDeals: data.length,
                        totalGCI
                    });
                } catch (error) {
                    console.error('Error loading stats:', error);
                } finally {
                    setLoading(false);
                }
            }

            if (loading) {
                return <div className="loading"><div className="spinner"></div>Loading dashboard...</div>;
            }

            return (
                <>
                    <div className="header">
                        <h2>Dashboard</h2>
                    </div>
                    <div className="content">
                        <div className="security-info">
                            <strong>Security Notice:</strong> This dashboard uses Supabase's read-only anonymous key for client-side data access. All forms include input validation. The Supabase API is configured with Row Level Security (RLS) policies to control data access.
                        </div>
                        <div className="stats-grid">
                            <div className="stat-card">
                                <h3>Total Volume</h3>
                                <div className="value">${(stats.totalVolume / 1000000).toFixed(1)}M</div>
                            </div>
                            <div className="stat-card">
                                <h3>Total Deals</h3>
                                <div className="value">{stats.totalDeals}</div>
                            </div>
                            <div className="stat-card">
                                <h3>Total GCI</h3>
                                <div className="value">${(stats.totalGCI / 1000).toFixed(0)}K</div>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        // Deals Page
        function DealsPage() {
            const [deals, setDeals] = useState([]);
            const [loading, setLoading] = useState(true);
            const [yearFilter, setYearFilter] = useState('all');
            const [showAddModal, setShowAddModal] = useState(false);
            const [successMessage, setSuccessMessage] = useState('');
            const [formErrors, setFormErrors] = useState({});
            const [formData, setFormData] = useState({
                address: '',
                client: '',
                agent: '',
                side: 'buy',
                stage: 'open',
                sale_price: '',
                gross_commission: '',
                team_gross: '',
                split: '',
                source: '',
                lender: '',
                binding_date: '',
                close_date: '',
                due_diligence: '',
                financing_contingency: '',
                closing_attorney: '',
                earnest_money: '',
                agent_commission: '',
                fmls_fee: '',
                team_split: '',
                net_commission: '',
                year: new Date().getFullYear(),
                referral_paid: false,
                handout: false
            });

            useEffect(() => {
                loadDeals();
            }, [yearFilter]);

            async function loadDeals() {
                try {
                    setLoading(true);
                    let query = supabaseClient.from('deals').select('*');

                    if (yearFilter !== 'all') {
                        query = query.eq('year', parseInt(yearFilter));
                    }

                    const { data, error } = await query;
                    if (error) throw error;

                    setDeals(data || []);
                } catch (error) {
                    console.error('Error loading deals:', error);
                } finally {
                    setLoading(false);
                }
            }

            function validateForm() {
                const errors = {};

                if (!formData.address?.trim()) errors.address = 'Address is required';
                if (!formData.client?.trim()) errors.client = 'Client name is required';
                if (!formData.agent?.trim()) errors.agent = 'Agent is required';
                if (formData.sale_price && isNaN(formData.sale_price)) errors.sale_price = 'Must be a number';
                if (formData.gross_commission && isNaN(formData.gross_commission)) errors.gross_commission = 'Must be a number';

                function TrendingPage() {
            const [trendingData, setTrendingData] = useState(null);

            const [selectedAgent, setSelectedAgent] = useState('Team');

            useEffect(() => { loadTrendingData(); }, []);

            async function loadTrendingData() {
                try {
                    const { data, error } = await supabaseClient.from('deals').select('*');
                    if (error) throw error;

                    const years = {};
                    const allAgents = new Set();

                    data.forEach(deal => {
                        const year = deal.year || 2026;
                        const volume = deal.sale_price || 0;
                        const gci = deal.gross_commission || 0;
                        const agent = deal.agent || 'Unknown';
                        allAgents.add(agent);

                        if (!years[year]) years[year] = { volume: 0, deals: 0, gci: 0, agents: {} };
                        years[year].volume += volume;
                        years[year].deals += 1;
                        years[year].gci += gci;

                        if (!years[year].agents[agent]) years[year].agents[agent] = { volume: 0, deals: 0, gci: 0 };
                        years[year].agents[agent].volume += volume;
                        years[year].agents[agent].deals += 1;
                        years[year].agents[agent].gci += gci;
                    });

                    setTrendingData({ years, agents: Array.from(allAgents).sort() });
                } catch (error) {
                    console.error('Error loading trending data:', error);
                } finally {
                    setLoading(false);
                }
            }
